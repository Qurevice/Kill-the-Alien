<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kill the Alien</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { margin: 0; min-height: 100vh; background: #0a0f1a; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .game-wrapper { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; background: #0b1219; cursor: crosshair; }
        .score { position: absolute; top: 12px; left: 16px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 4px 12px; border-radius: 30px; font-size: 20px; font-weight: bold; color: #ffd966; font-family: monospace; pointer-events: none; z-index: 10; letter-spacing: 1px; display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }
        .score-row { display: flex; align-items: center; gap: 8px; }
        .difficulty-dot { width: 12px; height: 12px; border-radius: 50%; background-color: #88ff44; box-shadow: 0 0 4px currentColor; }
        #scoreValue { font-weight: bold; font-size: 22px; }
        .wave-text { font-size: 14px; color: #aaddff; letter-spacing: 1px; }
        .coin-panel { position: absolute; top: 16px; right: 65px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 4px 12px 4px 8px; border-radius: 40px; display: flex; align-items: center; gap: 8px; z-index: 10; pointer-events: none; }
        .coin-icon { width: 28px; height: 28px; background: radial-gradient(circle at 30% 30%, #ffcc44, #e6a800); border-radius: 50%; border: 2px solid #ff8800; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #ff8800; font-weight: bold; }
        .coin-icon span { font-size: 18px; line-height: 1; }
        .coin-amount { font-size: 22px; font-weight: bold; color: #ffcc44; font-family: monospace; text-shadow: 0 0 2px #000; }
        .reset-btn { position: absolute; background: #aa88ff; border: none; font-size: 16px; font-weight: bold; padding: 4px 14px; border-radius: 40px; color: #1e1a2a; cursor: pointer; font-family: 'Segoe UI', 'Verdana', sans-serif; box-shadow: 0 3px 0 #6a4aaf; transition: 0.07s linear; z-index: 15; }
        .reset-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #6a4aaf; }
        .settings-icon, .shop-icon { position: absolute; right: 16px; width: 36px; height: 36px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border-radius: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; z-index: 20; transition: 0.1s; }
        .settings-icon { top: 16px; } .shop-icon { top: 66px; background: #aa66cc; }
        .settings-icon div, .shop-icon div { width: 22px; height: 2px; background: #ddd; margin: 3px 0; border-radius: 2px; }
        .shop-icon div { width: auto; height: auto; background: none; font-size: 28px; font-weight: bold; color: white; margin: 0; line-height: 1; }
        .settings-icon:active, .shop-icon:active { background: rgba(0,0,0,0.8); }
        .settings-menu, .shop-menu { position: absolute; top: 60px; right: 16px; background: rgba(30,30,40,0.95); backdrop-filter: blur(8px); border-radius: 20px; padding: 10px 0; display: flex; flex-direction: column; z-index: 25; opacity: 0; visibility: hidden; transition: 0.1s; border: 1px solid #888; min-width: 220px; }
        .shop-menu { top: 110px; right: 16px; }
        .settings-menu.show, .shop-menu.show { opacity: 1; visibility: visible; }
        .settings-menu button, .shop-menu button { background: transparent; border: none; color: #ffd966; font-size: 16px; font-family: monospace; padding: 8px 20px; text-align: left; cursor: pointer; font-weight: bold; transition: 0.05s; display: flex; align-items: center; gap: 12px; }
        .settings-menu button:active, .shop-menu button:active { background: #5a5a5a; }
        .shop-menu button .price { margin-left: auto; color: #ffcc44; }
        button[data-difficulty="easy"] { color: #88ff88 !important; }
        button[data-difficulty="medium"] { color: #ffcc44 !important; }
        button[data-difficulty="hard"] { color: #ff6666 !important; }
        .game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 20; pointer-events: none; }
        .final-score-box { background: rgba(0,0,0,0.85); border-radius: 40px; padding: 30px 50px; text-align: center; backdrop-filter: blur(8px); box-shadow: 0 0 40px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 15px; }
        .final-score-number { font-size: 80px; font-weight: bold; color: #ffd966; font-family: monospace; letter-spacing: 4px; text-shadow: 0 0 15px #ffaa33; }
        .final-record { font-size: 28px; color: #ffaa66; font-family: monospace; }
        .final-wave { font-size: 22px; color: #aaddff; font-family: monospace; }
        .game-over { opacity: 0; transition: opacity 0.2s ease; pointer-events: none; }
        .game-over.show { opacity: 1; }
        .start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); font-size: 32px; color: #ffd966; font-family: monospace; text-align: center; flex-direction: column; gap: 20px; cursor: pointer; transition: opacity 0.3s; }
        .start-screen span { font-size: 20px; color: #aaa; }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="score">
        <div class="score-row"><div class="difficulty-dot" id="difficultyDot"></div><span>Счёт: <span id="scoreValue">0</span></span></div>
        <div class="wave-text">Волна: <span id="waveValue">1</span></div>
    </div>
    <div class="coin-panel"><div class="coin-icon"><span>★</span></div><div class="coin-amount" id="coinAmount">0</div></div>
    <button id="resetBtn" class="reset-btn">ЗАНОВО</button>
    <div id="settingsIcon" class="settings-icon"><div></div><div></div><div></div></div>
    <div id="shopIcon" class="shop-icon"><div>+</div></div>
    <div id="settingsMenu" class="settings-menu">
        <button data-enemies="10">10 врагов</button>
        <button data-enemies="15">15 врагов</button>
        <button data-enemies="20">20 врагов</button>
        <hr style="margin:5px 0;border-color:#555;">
        <button data-difficulty="easy">Простой</button>
        <button data-difficulty="medium">Средний</button>
        <button data-difficulty="hard">Сложный</button>
    </div>
    <div id="shopMenu" class="shop-menu"></div>
    <div id="gameOverlay" class="game-over">
        <div class="final-score-box">
            <div class="final-score-number" id="finalScoreNumber">0</div>
            <div class="final-record" id="finalRecordSpan"></div>
            <div class="final-wave" id="finalWaveSpan"></div>
        </div>
    </div>
    <div id="startScreen" class="start-screen">⚡ KILL THE ALIEN ⚡<br><span>Нажмите в любом месте, чтобы начать</span></div>
</div>

<script>
(function(){
    const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreValue'), waveSpan = document.getElementById('waveValue'), resetBtn = document.getElementById('resetBtn');
    const gameOverlay = document.getElementById('gameOverlay'), finalScoreNumberSpan = document.getElementById('finalScoreNumber');
    const finalRecordSpan = document.getElementById('finalRecordSpan'), finalWaveSpan = document.getElementById('finalWaveSpan');
    const settingsIcon = document.getElementById('settingsIcon'), settingsMenu = document.getElementById('settingsMenu'), shopIcon = document.getElementById('shopIcon'), shopMenu = document.getElementById('shopMenu');
    const difficultyDot = document.getElementById('difficultyDot'), coinAmountSpan = document.getElementById('coinAmount'), startScreen = document.getElementById('startScreen');

    let audioCtx = null;
    function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    
    function playDischargeSound() {
        try { const ctx = ensureAudio(); const now = ctx.currentTime; const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.2); gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2); osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now + 0.2); } catch(e) {}
    }
    
    function playLaserSound(skin) {
        try {
            const ctx = ensureAudio(); const now = ctx.currentTime; let fs = 800, fe = 200, d = 0.15;
            if (skin === 'shield') { fs *= Math.pow(2, 3/12); fe *= Math.pow(2, 3/12); }
            else if (skin === 'fast') { fs *= Math.pow(2, 5/12); fe *= Math.pow(2, 5/12); }
            else if (skin === 'pierce') { fs *= Math.pow(2, -5/12); fe *= Math.pow(2, -5/12); }
            else if (skin === 'ricochet') {
                const o1 = ctx.createOscillator(), g1 = ctx.createGain(); o1.type='sawtooth'; o1.frequency.setValueAtTime(2400,now); o1.frequency.exponentialRampToValueAtTime(600,now+0.08); g1.gain.setValueAtTime(0.25,now); g1.gain.exponentialRampToValueAtTime(0.001,now+0.08); o1.connect(g1); g1.connect(ctx.destination); o1.start(now); o1.stop(now+0.08);
                const o2 = ctx.createOscillator(), g2 = ctx.createGain(); o2.type='sawtooth'; o2.frequency.setValueAtTime(1800,now); o2.frequency.exponentialRampToValueAtTime(300,now+0.1); g2.gain.setValueAtTime(0.25,now); g2.gain.exponentialRampToValueAtTime(0.001,now+0.1); o2.connect(g2); g2.connect(ctx.destination); o2.start(now); o2.stop(now+0.1);
                return;
            } else if (skin === 'discharge') {
                const osc = ctx.createOscillator(), gain = ctx.createGain(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1000, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.4); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4); osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now + 0.4);
                return;
            }
            const osc = ctx.createOscillator(), gain = ctx.createGain(); osc.type='sawtooth'; osc.frequency.setValueAtTime(fs,now); osc.frequency.exponentialRampToValueAtTime(fe,now+d); gain.gain.setValueAtTime(0.3,now); gain.gain.exponentialRampToValueAtTime(0.001,now+d); osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now+d);
        } catch(e) {}
    }
    function playExplosionSound() { try { const ctx = ensureAudio(); const bs = ctx.sampleRate*0.3; const b = ctx.createBuffer(1,bs,ctx.sampleRate); const d = b.getChannelData(0); for (let i=0;i<bs;i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.05)); const s = ctx.createBufferSource(); s.buffer=b; const g = ctx.createGain(); g.gain.setValueAtTime(0.55,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3); const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(4000,ctx.currentTime); f.frequency.exponentialRampToValueAtTime(500,ctx.currentTime+0.3); s.connect(f); f.connect(g); g.connect(ctx.destination); s.start(ctx.currentTime); } catch(e) {} }
    function playPlayerDeathSound() { try { const ctx = ensureAudio(); const now = ctx.currentTime; const dur = 0.7; const bs = Math.floor(ctx.sampleRate*dur); const nb = ctx.createBuffer(1,bs,ctx.sampleRate); const nd = nb.getChannelData(0); for (let i=0;i<bs;i++) { const t = i/ctx.sampleRate; nd[i] = (Math.random()*2-1)*Math.exp(-t/0.12); } const ns = ctx.createBufferSource(); ns.buffer=nb; const ng = ctx.createGain(); ng.gain.setValueAtTime(0.55,now); ng.gain.exponentialRampToValueAtTime(0.001,now+dur); const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.setValueAtTime(2500,now); bp.frequency.exponentialRampToValueAtTime(200,now+dur); bp.Q.setValueAtTime(1.8,now); ns.connect(bp); bp.connect(ng); ng.connect(ctx.destination); ns.start(now); const osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.setValueAtTime(90,now); osc.frequency.exponentialRampToValueAtTime(25,now+dur); const og = ctx.createGain(); og.gain.setValueAtTime(0.4,now); og.gain.exponentialRampToValueAtTime(0.001,now+dur); osc.connect(og); og.connect(ctx.destination); osc.start(now); osc.stop(now+dur); } catch(e) {} }

    let shakeIntensity = 0, shakeDuration = 0; const SHAKE_DECAY = 0.92;
    function addShake(i,d) { if (i>shakeIntensity||d>shakeDuration) { shakeIntensity=Math.max(shakeIntensity,i); shakeDuration=Math.max(shakeDuration,d); } }
    function applyShake(ctx) { if (shakeDuration>0 && shakeIntensity>0.1) { const ox=(Math.random()-0.5)*shakeIntensity*2, oy=(Math.random()-0.5)*shakeIntensity*2; ctx.translate(ox,oy); shakeIntensity*=SHAKE_DECAY; shakeDuration--; } else { shakeIntensity=0; shakeDuration=0; } }

    let PLAYER_X,PLAYER_Y,PLAYER_RADIUS,FOLLOW_RADIUS,ENEMY_RADIUS,ENEMY_BASE_SPEED,ENEMY_SPEED_MULTIPLIER=1.0,ENEMY_COUNT=10;
    let ENEMY_MIN_X,ENEMY_MAX_X,ENEMY_MIN_Y,ENEMY_MAX_Y;
    let playerSpinAngle=0; const PLAYER_SPIN_SPEED=0.008; let playerFlash=0,playerDestroyed=false,shieldActive=false,shieldCooldown=0;
    let recoilX=0,recoilY=0;
    let enemyFlash=[];
    let shells=[], SHELL_RADIUS, SHELL_SPEED_BASE, SHELL_SPEED;
    let enemies=[], particles=[], shrapnel=[], enemyBullets=[], lightningEffects=[];
    let score=0, record=0, maxWave=1;
    let gameActive=true, winFlag=false, turretAngle=0;
    let comets=[], cometSpawnTimer=0; const COMET_SPAWN_DELAY=180;
    let stars=[], currentOrientation='landscape', canvasWidth, canvasHeight;
    let currentDifficulty='easy', enemyShootTimer=0;
    let pendingGameOver=false, gameOverDelayTimer=null;
    let wave=1, penalty=1;
    let coins=0, totalKills=0, killsSinceLastBonus=0, currentSkin='default', ownedSkins=['default'];
    let ability_shield=false, ability_fastBullet=false, ability_pierce=false, ability_ricochet=false, ability_discharge=false;
    let waveTransitioning = false;

    const STAR_SPEED=0.64; const enemyColorHues=[120,0,60,30,200,270]; let currentEnemyHue=120;
    const glowColorMap={ 0:[255,255,100], 30:[255,255,100], 60:[255,255,100], 120:[100,200,255], 200:[255,150,50], 270:[180,100,255] };
    const skinsList = [
        { id: 'default', name: 'Обычный', price: 0 },
        { id: 'shield', name: 'Щит', price: 600 },
        { id: 'fast', name: 'Ускоренный снаряд', price: 800 },
        { id: 'pierce', name: 'Пробивной снаряд', price: 1000 },
        { id: 'ricochet', name: 'Рикошет', price: 1200 },
        { id: 'discharge', name: 'Разряд', price: 2000 }
    ];

    function spawnLightning(x1,y1,x2,y2) { lightningEffects.push({ x1, y1, x2, y2, life: 8 }); }

    function loadStats() {
        try {
            coins = parseInt(localStorage.getItem('ufo_coins')||'0',10);
            totalKills = parseInt(localStorage.getItem('ufo_total_kills')||'0',10);
            killsSinceLastBonus = totalKills % 5;
            currentSkin = localStorage.getItem('ufo_skin') || 'default';
            if (!skinsList.some(s=>s.id===currentSkin)) currentSkin='default';
            try { ownedSkins = JSON.parse(localStorage.getItem('ufo_owned_skins')); } catch(e) { ownedSkins = ['default']; }
            if (!ownedSkins.includes('default')) ownedSkins.push('default');
            maxWave = parseInt(localStorage.getItem('ufo_max_wave')||'1',10);
        } catch(e) { coins=0; totalKills=0; killsSinceLastBonus=0; currentSkin='default'; ownedSkins=['default']; maxWave=1; }
        coinAmountSpan.innerText=coins; updateShopMenu(); updateWaveUI();
    }
    function saveStats() { try { localStorage.setItem('ufo_coins',coins); localStorage.setItem('ufo_total_kills',totalKills); localStorage.setItem('ufo_skin',currentSkin); localStorage.setItem('ufo_owned_skins',JSON.stringify(ownedSkins)); localStorage.setItem('ufo_max_wave',maxWave); } catch(e) {} }
    function updateAbilities() {
        ability_shield = (currentSkin === 'shield'); ability_fastBullet = (currentSkin === 'fast'); ability_pierce = (currentSkin === 'pierce'); ability_ricochet = (currentSkin === 'ricochet'); ability_discharge = (currentSkin === 'discharge');
        if (ability_shield) { shieldActive=true; shieldCooldown=0; } else { shieldActive=false; shieldCooldown=0; }
        if (ability_fastBullet) SHELL_SPEED = SHELL_SPEED_BASE * 1.8; else if (ability_ricochet) SHELL_SPEED = SHELL_SPEED_BASE * 1.2; else if (ability_discharge) SHELL_SPEED = SHELL_SPEED_BASE * 1.4; else SHELL_SPEED = SHELL_SPEED_BASE * 1.0;
    }
    function addCoins(a) { if (a>0) { coins+=a; coinAmountSpan.innerText=coins; saveStats(); updateShopMenu(); } }
    function buySkin(id,pr) { if (ownedSkins.includes(id)) { if (currentSkin!==id) { currentSkin=id; saveStats(); updateAbilities(); updateShopMenu(); alert(`Скин "${skinsList.find(s=>s.id===id).name}" активирован!`); } else alert('Этот скин уже активен'); } else if (coins>=pr) { coins-=pr; ownedSkins.push(id); currentSkin=id; coinAmountSpan.innerText=coins; saveStats(); updateAbilities(); updateShopMenu(); alert(`Скин "${skinsList.find(s=>s.id===id).name}" куплен и активирован!`); } else alert('Недостаточно монет'); }
    function updateShopMenu() { shopMenu.innerHTML=''; skinsList.forEach(skin=>{ const io=ownedSkins.includes(skin.id), ic=(currentSkin===skin.id); let col='#ffffff'; if (ic) col='#88ff88'; else if (io) col='#ffcc44'; const pt=skin.price>0?`<span class="price">${skin.price}★</span>`:''; const btn=document.createElement('button'); btn.style.color=col; btn.innerHTML=`${skin.name} ${pt}`; btn.addEventListener('click',(e)=>{e.stopPropagation();buySkin(skin.id,skin.price);shopMenu.classList.remove('show');}); shopMenu.appendChild(btn); }); }
    function updateWaveUI() { waveSpan.innerText = wave; }
    function onEnemyKilled() { totalKills++; killsSinceLastBonus++; if (Math.random()<0.15) addCoins(1); if (killsSinceLastBonus>=5) { addCoins(1); killsSinceLastBonus-=5; } saveStats(); addShake(6,14); playExplosionSound(); }
    function awardWaveBonus() { let b=0; const ih=(currentDifficulty==='hard'); if (ENEMY_COUNT===10) b=ih?7:5; else if (ENEMY_COUNT===15) b=ih?10:7; else b=ih?15:10; addCoins(b); }
    function loadRecord() { try { record = parseInt(localStorage.getItem('ufo_shooter_record')||'0',10); } catch(e) { record=0; } }
    function saveRecord() { if (score>record) { record=score; try { localStorage.setItem('ufo_shooter_record',record); } catch(e){} } }
    function updateScoreUI() { scoreSpan.innerText=score; if (score>record) { record=score; try { localStorage.setItem('ufo_shooter_record',record); } catch(e){} } scoreSpan.style.color=score<0?'#ff6666':'#ffd966'; }
    function showGameOver() { if (!gameActive && winFlag) { finalScoreNumberSpan.innerText=score; finalRecordSpan.innerText=`Рекорд: ${record}`; finalWaveSpan.innerText=`Рекордная волна: ${maxWave}`; gameOverlay.classList.add('show'); } else { gameOverlay.classList.remove('show'); } }
    function scheduleGameOver() { if (pendingGameOver) return; pendingGameOver=true; playerDestroyed=true; createExplosion(PLAYER_X,PLAYER_Y,true); playPlayerDeathSound(); if (gameOverDelayTimer) clearTimeout(gameOverDelayTimer); gameOverDelayTimer=setTimeout(()=>{ if (gameActive) { gameActive=false; winFlag=true; showGameOver(); } pendingGameOver=false; },400); }
    function handlePlayerHit() { if (!gameActive) return; if (ability_shield && shieldActive) { shieldActive=false; shieldCooldown=60*60; return; } scheduleGameOver(); }
    function updateShieldCooldown() { if (ability_shield&&shieldCooldown>0) { shieldCooldown--; if (shieldCooldown<=0) shieldActive=true; } }
    function updateRecoil() { recoilX*=0.85; recoilY*=0.85; }
    function createIncomingWave() { const ne=[]; const cs=ENEMY_BASE_SPEED*ENEMY_SPEED_MULTIPLIER; for (let i=0;i<ENEMY_COUNT;i++) { let sx,sy,tx,ty; if (currentOrientation==='landscape') { sx=canvasWidth+ENEMY_RADIUS+150+Math.random()*200; sy=ENEMY_MIN_Y+Math.random()*(ENEMY_MAX_Y-ENEMY_MIN_Y); tx=ENEMY_MIN_X+Math.random()*(ENEMY_MAX_X-ENEMY_MIN_X); ty=sy; } else { sx=ENEMY_MIN_X+Math.random()*(ENEMY_MAX_X-ENEMY_MIN_X); sy=-ENEMY_RADIUS-150-Math.random()*200; tx=sx; ty=ENEMY_MIN_Y+Math.random()*(ENEMY_MAX_Y-ENEMY_MIN_Y); } let dx=tx-sx, dy=ty-sy; const len=Math.hypot(dx,dy); if (len>0.01) { dx=dx/len*cs; dy=dy/len*cs; } else { dx=cs*(Math.random()>0.5?1:-1); dy=cs*(Math.random()>0.5?1:-1); } ne.push({ x:sx,y:sy,r:ENEMY_RADIUS,vx:dx,vy:dy,spinAngle:Math.random()*Math.PI*2,spinSpeed:0.02+Math.random()*0.015,incoming:true,targetX:tx,targetY:ty }); } return ne; }
    function createWave() { return createIncomingWave(); }
    function nextWave() { if (!gameActive || waveTransitioning) return; waveTransitioning = true; awardWaveBonus(); wave++; penalty=wave; if (wave>maxWave) { maxWave=wave; saveStats(); } enemies=createWave(); shells=[]; shrapnel=[]; enemyBullets=[]; enemyFlash=[]; lightningEffects=[]; playerDestroyed=false; updateWaveUI(); waveTransitioning = false; }

            for (let i=0;i<7;i++) { const angle=(i/7)*Math.PI*2+Math.PI; const x=Math.cos(angle)*(PLAYER_RADIUS+2),y=Math.sin(angle)*(PLAYER_RADIUS+2); ctx.fillStyle="#ffaa44";ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill(); for (let j=1;j<=3;j++) { const px=x-Math.cos(angle)*j*2,py=y-Math.sin(angle)*j*2; ctx.fillStyle=`rgba(255,170,68,${0.3-j*0.1})`;ctx.beginPath();ctx.arc(px,py,1.5-j*0.3,0,Math.PI*2);ctx.fill(); } }
            for (let i=0;i<7;i++) { const angle=(i/7)*Math.PI*2+playerSpinAngle*2.5; const r=PLAYER_RADIUS+2; const x=Math.cos(angle)*r,y=Math.sin(angle)*r; ctx.fillStyle="#ffcc44";ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+5*Math.cos(angle+0.7),y+5*Math.sin(angle+0.7));ctx.lineTo(x+5*Math.cos(angle-0.7),y+5*Math.sin(angle-0.7));ctx.fill(); ctx.fillStyle="#ffaa00";ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+3*Math.cos(angle+0.5),y+3*Math.sin(angle+0.5));ctx.lineTo(x+3*Math.cos(angle-0.5),y+3*Math.sin(angle-0.5));ctx.fill(); }
            for (let i=0;i<3;i++) { const angle=(i/3)*Math.PI*2+Math.PI; const x=Math.cos(angle)*(PLAYER_RADIUS+3+i*2),y=Math.sin(angle)*(PLAYER_RADIUS+3+i*2); ctx.fillStyle=`rgba(155,89,182,${0.2-i*0.05})`;ctx.beginPath();ctx.arc(x,y,4-i,0,Math.PI*2);ctx.fill(); }
        } else if (currentSkin==='pierce') {
            ctx.fillStyle="#1a1a1a";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2);ctx.fill();

            for (let i=0;i<8;i++) { const angle=(i/8)*Math.PI*2+playerSpinAngle*2; const x=Math.cos(angle)*(PLAYER_RADIUS+1),y=Math.sin(angle)*(PLAYER_RADIUS+1); ctx.fillStyle="#ffaa33";ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+6*Math.cos(angle+0.6),y+6*Math.sin(angle+0.6));ctx.lineTo(x+6*Math.cos(angle-0.6),y+6*Math.sin(angle-0.6));ctx.fill();ctx.strokeStyle="#000";ctx.lineWidth=1;ctx.stroke(); }
            for (let i=0;i<4;i++) { const angle=(i/4)*Math.PI*2; ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(angle)*(PLAYER_RADIUS-4),Math.sin(angle)*(PLAYER_RADIUS-4));ctx.lineTo(Math.cos(angle+0.3)*(PLAYER_RADIUS-4),Math.sin(angle+0.3)*(PLAYER_RADIUS-4));ctx.fillStyle="#111";ctx.fill(); }

            ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS+5,0,Math.PI*2);ctx.fillStyle="rgba(255,200,0,0.15)";ctx.fill();
        } else if (currentSkin==='ricochet') {
            ctx.fillStyle="#ffdd00";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2);ctx.fill();
            ctx.fillStyle="#ffaa00";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle="#ffee44";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2);ctx.fill();

            for (let i=0;i<24;i++) { const angle=Math.random()*Math.PI*2; const r=PLAYER_RADIUS+2+Math.random()*4; const x=Math.cos(angle)*r,y=Math.sin(angle)*r; const alpha=0.4+Math.random()*0.6; ctx.fillStyle=`rgba(255,220,50,${alpha})`;ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill(); }
            for (let i=0;i<8;i++) { const angle=(i/8)*Math.PI*2+playerSpinAngle*3; const x=Math.cos(angle)*(PLAYER_RADIUS+3),y=Math.sin(angle)*(PLAYER_RADIUS+3); ctx.fillStyle="#ff8800";ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill(); }
        } else if (currentSkin==='discharge') {
            ctx.fillStyle="#8800cc";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2);ctx.fill();
            ctx.fillStyle="#6600aa";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle="#aa44ff";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2);ctx.fill();
            for (let i=0;i<3;i++) { const angle=(i/3)*Math.PI*2; const x=Math.cos(angle)*(PLAYER_RADIUS-2),y=Math.sin(angle)*(PLAYER_RADIUS-2); ctx.fillStyle="#ffffff";ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle="rgba(200,100,255,0.9)";ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill(); }

            for (let i=0;i<6;i++) { const angle=(i/6)*Math.PI*2+playerSpinAngle*2; const x=Math.cos(angle)*(PLAYER_RADIUS+3),y=Math.sin(angle)*(PLAYER_RADIUS+3); ctx.fillStyle="#ffcc44"; ctx.beginPath();ctx.arc(x,y,2.2,0,Math.PI*2);ctx.fill(); }
        } else {
            const grad=ctx.createRadialGradient(-6,-6,5,0,0,PLAYER_RADIUS); grad.addColorStop(0,"#f8f8fc");grad.addColorStop(0.5,"#b0b8c0");grad.addColorStop(1,"#708090");
            ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2);ctx.fill(); ctx.strokeStyle="#2a2a2a";ctx.lineWidth=1.5;ctx.stroke();
            ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2);ctx.fillStyle="#d0d8e0";ctx.fill();ctx.stroke();
            ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2);ctx.fillStyle="#8898a0";ctx.fill();ctx.stroke();
        }
        for (let i=0;i<16;i++) { const angle=(i/16)*Math.PI*2; const x=Math.cos(angle)*(PLAYER_RADIUS-3),y=Math.sin(angle)*(PLAYER_RADIUS-3); ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fillStyle="#505860";ctx.fill(); ctx.beginPath();ctx.arc(x,y,0.6,0,Math.PI*2);ctx.fillStyle="#e0e8f0";ctx.fill(); ctx.strokeStyle="#222";ctx.lineWidth=0.5;ctx.stroke(); }
        const cockpitR=PLAYER_RADIUS*0.55;

        ctx.beginPath();ctx.ellipse(blinkX-2,blinkY-2,cockpitR*0.15,cockpitR*0.12,0,0,Math.PI*2);ctx.fillStyle="#ffffff";ctx.fill();

        ctx.beginPath();ctx.moveTo(0,-cockpitR);ctx.lineTo(-3,-cockpitR-antenaH);ctx.lineTo(3,-cockpitR-antenaH);ctx.fillStyle="#c0c8d0";ctx.fill();ctx.stroke();

        ctx.beginPath();ctx.moveTo(PLAYER_X,PLAYER_Y); const dirX=Math.cos(turretAngle)*(PLAYER_RADIUS+14),dirY=Math.sin(turretAngle)*(PLAYER_RADIUS+14); ctx.lineTo(PLAYER_X+dirX,PLAYER_Y+dirY);ctx.strokeStyle="#88ff88";ctx.lineWidth=2.5;ctx.stroke();

    function lerpColor(c1,c2,t) { return [Math.round(c1[0]+(c2[0]-c1[0])*t),Math.round(c1[1]+(c2[1]-c1[1])*t),Math.round(c1[2]+(c2[2]-c1[2])*t),c1[3]+(c2[3]-c1[3])*t]; }
    function drawEnemy(e,idx) { ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.spinAngle); const baseGlow=glowColorMap[currentEnemyHue]||[100,255,100]; const normalGlow=[baseGlow[0],baseGlow[1],baseGlow[2],0.35], attackGlow=[255,80,80,0.8]; let flashTimer=0; for (let f of enemyFlash) if (f.index===idx) { flashTimer=f.timer; break; } const fp=flashTimer/8; const cg=lerpColor(normalGlow,attackGlow,fp); const gmr=e.r+6; const gg=ctx.createRadialGradient(0,0,e.r-2,0,0,gmr); gg.addColorStop(0,`rgba(${cg[0]},${cg[1]},${cg[2]},${cg[3]})`);gg.addColorStop(1,`rgba(${cg[0]},${cg[1]},${cg[2]},0)`); ctx.beginPath();ctx.arc(0,0,gmr,0,Math.PI*2);ctx.fillStyle=gg;ctx.fill(); if (fp>0) { const fg=ctx.createRadialGradient(0,0,e.r-2,0,0,e.r+8); fg.addColorStop(0,`rgba(255,60,60,${1*fp})`);fg.addColorStop(0.5,`rgba(255,20,20,${0.8*fp})`);fg.addColorStop(1,'rgba(255,0,0,0)'); ctx.beginPath();ctx.arc(0,0,e.r+8,0,Math.PI*2);ctx.fillStyle=fg;ctx.fill(); } const hue=currentEnemyHue; const lightColor=`hsl(${hue},70%,60%)`,darkColor=`hsl(${hue},80%,40%)`,midColor=`hsl(${hue},70%,50%)`; ctx.shadowBlur=6;ctx.shadowColor=`hsl(${hue},80%,50%)`; const grad=ctx.createRadialGradient(-4,-4,4,0,0,e.r); grad.addColorStop(0,lightColor);grad.addColorStop(1,darkColor); ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(0,0,e.r-4,0,Math.PI*2);ctx.fillStyle=midColor;ctx.fill(); const cockpitR=e.r*0.52; ctx.beginPath();ctx.arc(0,0,cockpitR+1,0,Math.PI*2);ctx.strokeStyle="#888888";ctx.lineWidth=1.5;ctx.stroke(); ctx.beginPath();ctx.arc(0,0,cockpitR,0,Math.PI*2);ctx.fillStyle="#7ec8e3";ctx.fill(); ctx.beginPath();ctx.arc(0,0,cockpitR-2,0,Math.PI*2);ctx.fillStyle="#9bdaf5";ctx.fill(); ctx.beginPath();ctx.ellipse(-cockpitR*0.3,-cockpitR*0.3,cockpitR*0.3,cockpitR*0.2,0,0,Math.PI*2);ctx.fillStyle="#ffffffcc";ctx.fill(); for (let i=0;i<8;i++) { const angle=(i/8)*Math.PI*2; const x=Math.cos(angle)*(e.r-2),y=Math.sin(angle)*(e.r-2); ctx.shadowBlur=8;ctx.shadowColor=`hsl(${hue},80%,60%)`; ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle=`hsl(${hue},80%,65%)`;ctx.fill(); ctx.shadowBlur=2;ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fillStyle=`hsl(${hue},90%,80%)`;ctx.fill(); } ctx.restore(); }
    function drawEnemyBullets() { for (let b of enemyBullets) { ctx.beginPath();ctx.arc(b.x,b.y,b.radius,0,Math.PI*2);ctx.fillStyle="#ff4444";ctx.fill(); ctx.beginPath();ctx.arc(b.x,b.y,b.radius-2,0,Math.PI*2);ctx.fillStyle="#ff8888";ctx.fill(); } }
    function drawParticles() { for (let p of particles) { ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill(); } }
    function drawShrapnel() { for (let sh of shrapnel) { ctx.beginPath();ctx.arc(sh.x,sh.y,sh.radius-2,0,Math.PI*2);ctx.fillStyle="#cc8844";ctx.fill(); ctx.beginPath();ctx.arc(sh.x,sh.y,sh.radius-4,0,Math.PI*2);ctx.fillStyle="#ffaa66";ctx.fill(); } }
    function drawShells() { for (let s of shells) { if ((s.isFast||s.isPierce||s.isRicochet||ability_discharge)&&s.trail&&s.trail.length>1) { for (let j=0;j<s.trail.length;j++) { const t=s.trail[j]; const alpha=0.5*(1-j/s.trail.length); const radius=SHELL_RADIUS*(1-j/s.trail.length)*0.9; if (radius>0.2) { ctx.beginPath();ctx.arc(t.x,t.y,radius,0,Math.PI*2); if (s.isPierce) ctx.fillStyle=`rgba(255,140,0,${alpha})`; else if (s.isRicochet) ctx.fillStyle=`rgba(255,255,255,${alpha})`; else if (ability_discharge) ctx.fillStyle=`rgba(255,255,100,${alpha})`; else ctx.fillStyle=`rgba(255,255,100,${alpha})`; ctx.fill(); } } } let mc,mic,lic; if (s.isPierce) { mc="#ff2200";mic="#cc1100";lic="#ff6644"; } else if (s.isFast) { mc="#ff4444";mic="#cc2222";lic="#ff8888"; } else if (s.isRicochet||ability_ricochet) { mc="#ffaa44";mic="#dd8800";lic="#ffcc66"; } else if (ability_discharge) { mc="#ffaa00";mic="#cc8800";lic="#ffcc44"; } else { mc="#88ff44";mic="#44cc22";lic="#aaff88"; } ctx.beginPath();ctx.arc(s.x,s.y,SHELL_RADIUS-1,0,Math.PI*2);ctx.fillStyle=mc;ctx.fill(); ctx.beginPath();ctx.arc(s.x,s.y,SHELL_RADIUS-2,0,Math.PI*2);ctx.fillStyle=mic;ctx.fill(); ctx.beginPath();ctx.arc(s.x,s.y,SHELL_RADIUS-3,0,Math.PI*2);ctx.fillStyle=lic;ctx.fill(); ctx.beginPath();ctx.arc(s.x-s.vx*1.5,s.y-s.vy*1.5,SHELL_RADIUS-3,0,Math.PI*2);ctx.fillStyle=s.isPierce?"#ff664444":(s.isFast?"#ff888844":(s.isRicochet?"#ffcc6644":(ability_discharge?"#ffcc6644":"#aaff8844")));ctx.fill(); } }
    function drawLightning() { for (let l of lightningEffects) { ctx.save(); ctx.beginPath(); ctx.moveTo(l.x1, l.y1); const segments = 5; for (let i=1; i<=segments; i++) { const t = i / segments; const midX = l.x1 + (l.x2 - l.x1) * t + (Math.random() - 0.5) * 20; const midY = l.y1 + (l.y2 - l.y1) * t + (Math.random() - 0.5) * 20; ctx.lineTo(midX, midY); } ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = '#ffff00'; ctx.stroke(); ctx.restore(); } for (let i=lightningEffects.length-1; i>=0; i--) { lightningEffects[i].life--; if (lightningEffects[i].life <= 0) lightningEffects.splice(i,1); } }
    function draw() { ctx.save();applyShake(ctx);drawBackground();drawAimZone(); for (let i=0;i<enemies.length;i++) drawEnemy(enemies[i],i); drawEnemyBullets();drawParticles();drawShrapnel();drawShells();drawLightning();drawPlayer(); ctx.restore(); }

    function gameLoop() {
        if (gameActive) {
            playerSpinAngle+=PLAYER_SPIN_SPEED; updateRecoil(); moveEnemies(); updateShells(); updateShrapnel(); updateParticles(); updateComets(); updateEnemyBullets(); updateEnemyFlash(); updateStars(); updateShieldCooldown();
            if (currentDifficulty==='hard'&&enemies.length>0) { if (enemyShootTimer<=0) { const ri=Math.floor(Math.random()*enemies.length); const re=enemies[ri]; if (re) enemyShoot(re,ri); enemyShootTimer=30; } else enemyShootTimer--; }
            checkWin();
        }
        draw(); requestAnimationFrame(gameLoop);
    }

    function resizeCanvas() { canvas.width=window.innerWidth;canvas.height=window.innerHeight; recalcDimensions(); generateStars(); randomEnemyColor(); enemies=createWave(); shells=[];particles=[];shrapnel=[];enemyBullets=[];enemyFlash=[];lightningEffects=[]; if (gameOverDelayTimer) clearTimeout(gameOverDelayTimer); pendingGameOver=false;playerDestroyed=false;gameActive=true;winFlag=false;playerFlash=0;comets=[];cometSpawnTimer=30;playerSpinAngle=0;enemyShootTimer=0;wave=1;penalty=1;score=0;updateScoreUI(); recoilX=0;recoilY=0;shakeIntensity=0;shakeDuration=0; if (ability_shield) { shieldActive=true;shieldCooldown=0; } showGameOver();updateWaveUI(); }
    function setDifficulty(l) { currentDifficulty=l; switch(l){case'easy':ENEMY_SPEED_MULTIPLIER=1.0;break;case'medium':ENEMY_SPEED_MULTIPLIER=1.7;break;case'hard':ENEMY_SPEED_MULTIPLIER=2.0;break;} if (currentDifficulty==='easy')difficultyDot.style.backgroundColor='#88ff44';else if (currentDifficulty==='medium')difficultyDot.style.backgroundColor='#ffcc44';else difficultyDot.style.backgroundColor='#ff4444'; resetGame(); }
    function setEnemyCount(c) { ENEMY_COUNT=c; resetGame(); }
    settingsIcon.addEventListener('click',(e)=>{e.stopPropagation();settingsMenu.classList.toggle('show');if (shopMenu.classList.contains('show'))shopMenu.classList.remove('show');});
    shopIcon.addEventListener('click',(e)=>{e.stopPropagation();shopMenu.classList.toggle('show');if (settingsMenu.classList.contains('show'))settingsMenu.classList.remove('show');});
    document.addEventListener('click',(e)=>{if (!settingsIcon.contains(e.target)&&!settingsMenu.contains(e.target))settingsMenu.classList.remove('show');if (!shopIcon.contains(e.target)&&!shopMenu.contains(e.target))shopMenu.classList.remove('show');});
    function startGame() { startScreen.style.display='none'; loadStats(); loadRecord(); resizeCanvas(); updateAbilities(); difficultyDot.style.backgroundColor='#88ff44'; canvas.addEventListener('mousemove',updateAimFromPointer); canvas.addEventListener('touchmove',(e)=>{e.preventDefault();updateAimFromPointer(e);}); canvas.addEventListener('touchstart',(e)=>{e.preventDefault();onPointerDown(e);}); canvas.addEventListener('mousedown',onPointerDown); canvas.addEventListener('contextmenu',(e)=>e.preventDefault()); resetBtn.addEventListener('click',()=>{resizeCanvas();}); document.querySelectorAll('.settings-menu button[data-enemies]').forEach(btn=>{btn.addEventListener('click',(e)=>{const cnt=parseInt(btn.getAttribute('data-enemies'),10);if (!isNaN(cnt)&&cnt!==ENEMY_COUNT)setEnemyCount(cnt);settingsMenu.classList.remove('show');});}); document.querySelectorAll('.settings-menu button[data-difficulty]').forEach(btn=>{btn.addEventListener('click',(e)=>{const diff=btn.getAttribute('data-difficulty');setDifficulty(diff);settingsMenu.classList.remove('show');});}); window.addEventListener('resize',()=>{resizeCanvas();}); gameLoop(); }
    startScreen.addEventListener('click',startGame); startScreen.addEventListener('touchstart',startGame);
})();
