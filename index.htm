<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kill the Alien — щит с кулдауном</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        .game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0b1219;
            cursor: crosshair;
        }
        .score {
            position: absolute;
            top: 12px;
            left: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            color: #ffd966;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 1px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
        }
        .score-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .difficulty-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #88ff44;
            box-shadow: 0 0 4px currentColor;
        }
        #scoreValue {
            font-weight: bold;
            font-size: 22px;
        }
        .wave-text {
            font-size: 14px;
            color: #aaddff;
            letter-spacing: 1px;
        }
        .coin-panel {
            position: absolute;
            top: 16px;
            right: 65px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 12px 4px 8px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            pointer-events: none;
        }
        .coin-icon {
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #ffcc44, #e6a800);
            border-radius: 50%;
            border: 2px solid #ff8800;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #ff8800;
            font-weight: bold;
        }
        .coin-icon span {
            font-size: 18px;
            line-height: 1;
        }
        .coin-amount {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc44;
            font-family: monospace;
            text-shadow: 0 0 2px #000;
        }
        .reset-btn {
            position: absolute;
            background: #aa88ff;
            border: none;
            font-size: 16px;
            font-weight: bold;
            padding: 4px 14px;
            border-radius: 40px;
            color: #1e1a2a;
            cursor: pointer;
            font-family: 'Segoe UI', 'Verdana', sans-serif;
            box-shadow: 0 3px 0 #6a4aaf;
            transition: 0.07s linear;
            z-index: 15;
        }
        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #6a4aaf;
        }
        .settings-icon, .shop-icon {
            position: absolute;
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 20;
            transition: 0.1s;
        }
        .settings-icon {
            top: 16px;
        }
        .shop-icon {
            top: 66px;
            background: #aa66cc;
        }
        .settings-icon div, .shop-icon div {
            width: 22px;
            height: 2px;
            background: #ddd;
            margin: 3px 0;
            border-radius: 2px;
        }
        .shop-icon div {
            width: auto;
            height: auto;
            background: none;
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin: 0;
            line-height: 1;
        }
        .settings-icon:active, .shop-icon:active {
            background: rgba(0,0,0,0.8);
        }
        .settings-menu, .shop-menu {
            position: absolute;
            top: 60px;
            right: 16px;
            background: rgba(30,30,40,0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            z-index: 25;
            opacity: 0;
            visibility: hidden;
            transition: 0.1s;
            border: 1px solid #888;
            min-width: 220px;
        }
        .shop-menu {
            top: 110px;
            right: 16px;
        }
        .settings-menu.show, .shop-menu.show {
            opacity: 1;
            visibility: visible;
        }
        .settings-menu button, .shop-menu button {
            background: transparent;
            border: none;
            color: #ffd966;
            font-size: 16px;
            font-family: monospace;
            padding: 8px 20px;
            text-align: left;
            cursor: pointer;
            font-weight: bold;
            transition: 0.05s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .settings-menu button:active, .shop-menu button:active {
            background: #5a5a5a;
        }
        .shop-menu button .price {
            margin-left: auto;
            color: #ffcc44;
        }
        button[data-difficulty="easy"] {
            color: #88ff88 !important;
        }
        button[data-difficulty="medium"] {
            color: #ffcc44 !important;
        }
        button[data-difficulty="hard"] {
            color: #ff6666 !important;
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }
        .final-score-box {
            background: rgba(0,0,0,0.85);
            border-radius: 40px;
            padding: 30px 50px;
            text-align: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .final-score-number {
            font-size: 80px;
            font-weight: bold;
            color: #ffd966;
            font-family: monospace;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #ffaa33;
        }
        .final-record {
            font-size: 28px;
            color: #ffaa66;
            font-family: monospace;
        }
        .game-over {
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .game-over.show {
            opacity: 1;
        }
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            font-size: 32px;
            color: #ffd966;
            font-family: monospace;
            text-align: center;
            flex-direction: column;
            gap: 20px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .start-screen span {
            font-size: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="score">
        <div class="score-row">
            <div class="difficulty-dot" id="difficultyDot"></div>
            <span>Счёт: <span id="scoreValue">0</span></span>
        </div>
        <div class="wave-text">Волна: <span id="waveValue">1</span></div>
    </div>
    <div class="coin-panel">
        <div class="coin-icon"><span>★</span></div>
        <div class="coin-amount" id="coinAmount">0</div>
    </div>
    <button id="resetBtn" class="reset-btn">ЗАНОВО</button>
    <div id="settingsIcon" class="settings-icon">
        <div></div><div></div><div></div>
    </div>
    <div id="shopIcon" class="shop-icon">
        <div>+</div>
    </div>
    <div id="settingsMenu" class="settings-menu">
        <button data-enemies="10">10 врагов</button>
        <button data-enemies="15">15 врагов</button>
        <button data-enemies="20">20 врагов</button>
        <hr style="margin: 5px 0; border-color: #555;">
        <button data-difficulty="easy">Простой</button>
        <button data-difficulty="medium">Средний</button>
        <button data-difficulty="hard">Сложный</button>
    </div>
    <div id="shopMenu" class="shop-menu"></div>
    <div id="gameOverlay" class="game-over">
        <div class="final-score-box">
            <div class="final-score-number" id="finalScoreNumber">0</div>
            <div class="final-record" id="finalRecordSpan"></div>
        </div>
    </div>
    <div id="startScreen" class="start-screen">
        ⚡ KILL THE ALIEN ⚡<br>
        <span>Нажмите в любом месте, чтобы начать</span>
    </div>
</div>

<script>
    (function(){
        // ----- ЭЛЕМЕНТЫ -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const waveSpan = document.getElementById('waveValue');
        const resetBtn = document.getElementById('resetBtn');
        const gameOverlay = document.getElementById('gameOverlay');
        const finalScoreNumberSpan = document.getElementById('finalScoreNumber');
        const finalRecordSpan = document.getElementById('finalRecordSpan');
        const settingsIcon = document.getElementById('settingsIcon');
        const settingsMenu = document.getElementById('settingsMenu');
        const shopIcon = document.getElementById('shopIcon');
        const shopMenu = document.getElementById('shopMenu');
        const difficultyDot = document.getElementById('difficultyDot');
        const coinAmountSpan = document.getElementById('coinAmount');
        const startScreen = document.getElementById('startScreen');
        
        // ----- ТРЯСКА ЭКРАНА -----
        let shakeIntensity = 0;
        let shakeDuration = 0;
        function addShake(intensity, duration) {
            shakeIntensity = Math.max(shakeIntensity, intensity);
            shakeDuration = Math.max(shakeDuration, duration);
        }
        
        // ----- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ -----
        let PLAYER_X, PLAYER_Y;
        let PLAYER_RADIUS;
        let FOLLOW_RADIUS;
        let ENEMY_RADIUS;
        let ENEMY_BASE_SPEED;
        let ENEMY_SPEED_MULTIPLIER = 1.0;
        let ENEMY_COUNT = 10;
        let ENEMY_MIN_X, ENEMY_MAX_X, ENEMY_MIN_Y, ENEMY_MAX_Y;
        
        let playerSpinAngle = 0;
        const PLAYER_SPIN_SPEED = 0.008;
        let playerFlash = 0;
        let playerDestroyed = false;
        
        // Логика щита (только для скина shield)
        let shieldActive = false;      // активен ли щит в данный момент
        let shieldCooldownTimer = 0;   // таймер восстановления (в кадрах)
        let shieldBlink = false;       // для мигания при восстановлении
        
        let enemyFlash = [];
        
        let shells = [];
        let SHELL_RADIUS;
        let SHELL_SPEED_BASE;
        let SHELL_SPEED;
        
        let enemies = [];
        let particles = [];
        let shrapnel = [];
        let enemyBullets = [];
        let score = 0;
        let record = 0;
        let gameActive = true;
        let winFlag = false;
        let turretAngle = 0;
        
        let comets = [];
        let cometSpawnTimer = 0;
        let COMET_SPAWN_DELAY = 180;
        
        let stars = [];
        let currentOrientation = 'landscape';
        let canvasWidth, canvasHeight;
        
        let currentDifficulty = 'easy';
        let enemyShootTimer = 0;
        
        let pendingGameOver = false;
        let gameOverDelayTimer = null;
        
        let wave = 1;
        let penalty = 1;
        
        let coins = 0;
        let totalKills = 0;
        let killsSinceLastBonus = 0;
        let currentSkin = 'default';
        let ownedSkins = ['default'];
        
        let ability_shield = false;
        let ability_fastBullet = false;
        let ability_pierce = false;
        let ability_ricochet = false;
        
        const STAR_SPEED = 0.64;
        const enemyColorHues = [120, 0, 60, 30, 200, 270];
        let currentEnemyHue = 120;
        
        const skinsList = [
            { id: 'default', name: 'Обычный', price: 0 },
            { id: 'shield', name: 'Щит', price: 600 },
            { id: 'fast', name: 'Ускоренный снаряд', price: 800 },
            { id: 'pierce', name: 'Пробивной снаряд', price: 1000 },
            { id: 'ricochet', name: 'Рикошет', price: 1200 }
        ];
        
        function loadStats() {
            try {
                const savedCoins = localStorage.getItem('ufo_coins');
                coins = (savedCoins !== null && !isNaN(parseInt(savedCoins,10))) ? parseInt(savedCoins,10) : 0;
                const savedTotalKills = localStorage.getItem('ufo_total_kills');
                totalKills = (savedTotalKills !== null && !isNaN(parseInt(savedTotalKills,10))) ? parseInt(savedTotalKills,10) : 0;
                killsSinceLastBonus = totalKills % 5;
                const savedSkin = localStorage.getItem('ufo_skin');
                if (savedSkin !== null && skinsList.some(s => s.id === savedSkin)) {
                    currentSkin = savedSkin;
                } else {
                    currentSkin = 'default';
                }
                const savedOwned = localStorage.getItem('ufo_owned_skins');
                if (savedOwned !== null) {
                    try {
                        const parsed = JSON.parse(savedOwned);
                        if (Array.isArray(parsed)) ownedSkins = parsed;
                        else ownedSkins = ['default'];
                    } catch(e) { ownedSkins = ['default']; }
                } else {
                    ownedSkins = ['default'];
                }
                if (!ownedSkins.includes('default')) ownedSkins.push('default');
            } catch(e) {
                coins = 0; totalKills = 0; killsSinceLastBonus = 0; currentSkin = 'default'; ownedSkins = ['default'];
            }
            coinAmountSpan.innerText = coins;
            updateShopMenu();
            updateWaveUI();
        }
        
        function saveStats() {
            try {
                localStorage.setItem('ufo_coins', coins);
                localStorage.setItem('ufo_total_kills', totalKills);
                localStorage.setItem('ufo_skin', currentSkin);
                localStorage.setItem('ufo_owned_skins', JSON.stringify(ownedSkins));
            } catch(e) {}
        }
        
        function updateAbilities() {
            ability_shield = (currentSkin === 'shield');
            ability_fastBullet = (currentSkin === 'fast');
            ability_pierce = (currentSkin === 'pierce');
            ability_ricochet = (currentSkin === 'ricochet');
            // При активации скина щит активируется, если не на кулдауне
            if (ability_shield && shieldCooldownTimer <= 0) {
                shieldActive = true;
            } else if (!ability_shield) {
                shieldActive = false;
            }
            if (ability_fastBullet) SHELL_SPEED = SHELL_SPEED_BASE * 1.8;
            else if (ability_ricochet) SHELL_SPEED = SHELL_SPEED_BASE * 1.2;
            else SHELL_SPEED = SHELL_SPEED_BASE * 1.0;
        }
        
        function addCoins(amount) {
            if (amount > 0) {
                coins += amount;
                coinAmountSpan.innerText = coins;
                saveStats();
                updateShopMenu();
            }
        }
        
        function buySkin(skinId, price) {
            if (ownedSkins.includes(skinId)) {
                if (currentSkin !== skinId) {
                    currentSkin = skinId;
                    saveStats();
                    updateAbilities();
                    updateShopMenu();
                    alert(`Скин "${skinsList.find(s=>s.id===skinId).name}" активирован!`);
                } else {
                    alert('Этот скин уже активен');
                }
            } else if (coins >= price) {
                coins -= price;
                ownedSkins.push(skinId);
                currentSkin = skinId;
                coinAmountSpan.innerText = coins;
                saveStats();
                updateAbilities();
                updateShopMenu();
                alert(`Скин "${skinsList.find(s=>s.id===skinId).name}" куплен и активирован!`);
            } else {
                alert('Недостаточно монет');
            }
        }
        
        function updateShopMenu() {
            shopMenu.innerHTML = '';
            skinsList.forEach(skin => {
                const isOwned = ownedSkins.includes(skin.id);
                const isCurrent = (currentSkin === skin.id);
                let color = '#ffffff';
                if (isCurrent) color = '#88ff88';
                else if (isOwned) color = '#ffcc44';
                const priceText = skin.price > 0 ? `<span class="price">${skin.price}★</span>` : '';
                const btn = document.createElement('button');
                btn.style.color = color;
                btn.innerHTML = `${skin.name} ${priceText}`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    buySkin(skin.id, skin.price);
                    shopMenu.classList.remove('show');
                });
                shopMenu.appendChild(btn);
            });
        }
        
        function updateWaveUI() {
            waveSpan.innerText = wave;
        }
        
        function onEnemyKilled() {
            totalKills++;
            killsSinceLastBonus++;
            if (Math.random() < 0.15) addCoins(1);
            if (killsSinceLastBonus >= 5) {
                addCoins(1);
                killsSinceLastBonus -= 5;
            }
            saveStats();
            addShake(5, 5);
        }
        
        function awardWaveBonus() {
            let bonus = 0;
            const isHard = (currentDifficulty === 'hard');
            if (ENEMY_COUNT === 10) bonus = isHard ? 7 : 5;
            else if (ENEMY_COUNT === 15) bonus = isHard ? 10 : 7;
            else if (ENEMY_COUNT === 20) bonus = isHard ? 15 : 10;
            addCoins(bonus);
        }
        
        function loadRecord() {
            try {
                const saved = localStorage.getItem('ufo_shooter_record');
                record = (saved !== null && !isNaN(parseInt(saved,10))) ? parseInt(saved,10) : 0;
            } catch(e) { record = 0; }
        }
        
        function saveRecord() {
            if (score > record) {
                record = score;
                try { localStorage.setItem('ufo_shooter_record', record); } catch(e) {}
            }
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
            if (score > record) {
                record = score;
                try { localStorage.setItem('ufo_shooter_record', record); } catch(e) {}
            }
            scoreSpan.style.color = score < 0 ? '#ff6666' : '#ffd966';
        }
        
        function showGameOver() {
            if (!gameActive && winFlag) {
                finalScoreNumberSpan.innerText = score;
                finalRecordSpan.innerText = `Рекорд: ${record}`;
                gameOverlay.classList.add('show');
            } else {
                gameOverlay.classList.remove('show');
            }
        }
        
        function scheduleGameOver() {
            if (pendingGameOver) return;
            pendingGameOver = true;
            playerDestroyed = true;
            createExplosion(PLAYER_X, PLAYER_Y, true);
            if (gameOverDelayTimer) clearTimeout(gameOverDelayTimer);
            gameOverDelayTimer = setTimeout(() => {
                if (gameActive) {
                    gameActive = false;
                    winFlag = true;
                    showGameOver();
                }
                pendingGameOver = false;
            }, 400);
        }
        
        // Обновление кулдауна щита и мигания
        function updateShieldCooldown() {
            if (!ability_shield) return;
            if (shieldCooldownTimer > 0) {
                shieldCooldownTimer--;
                if (shieldCooldownTimer === 0) {
                    shieldActive = true;
                }
                // Мигание: каждые 30 кадров (0.5 сек при 60 fps) меняем состояние
                if (shieldCooldownTimer > 0 && Math.floor(shieldCooldownTimer / 15) % 2 === 0) {
                    shieldBlink = true;
                } else {
                    shieldBlink = false;
                }
            } else {
                shieldBlink = false;
            }
        }
        
        function handlePlayerHit() {
            if (!gameActive) return;
            if (ability_shield && shieldActive) {
                shieldActive = false;
                shieldCooldownTimer = 60 * 60; // 60 секунд при 60 FPS = 3600 кадров
                return;
            }
            scheduleGameOver();
        }
        
        function createIncomingWave() {
            const newEnemies = [];
            const currentSpeed = ENEMY_BASE_SPEED * ENEMY_SPEED_MULTIPLIER;
            for(let i = 0; i < ENEMY_COUNT; i++) {
                let startX, startY, targetX, targetY;
                if (currentOrientation === 'landscape') {
                    startX = canvasWidth + ENEMY_RADIUS + 150 + Math.random() * 200;
                    startY = ENEMY_MIN_Y + Math.random() * (ENEMY_MAX_Y - ENEMY_MIN_Y);
                    targetX = ENEMY_MIN_X + Math.random() * (ENEMY_MAX_X - ENEMY_MIN_X);
                    targetY = startY;
                } else {
                    startX = ENEMY_MIN_X + Math.random() * (ENEMY_MAX_X - ENEMY_MIN_X);
                    startY = -ENEMY_RADIUS - 150 - Math.random() * 200;
                    targetX = startX;
                    targetY = ENEMY_MIN_Y + Math.random() * (ENEMY_MAX_Y - ENEMY_MIN_Y);
                }
                let dx = targetX - startX, dy = targetY - startY;
                const len = Math.hypot(dx, dy);
                if (len > 0.01) { dx = dx / len * currentSpeed; dy = dy / len * currentSpeed; }
                else { dx = currentSpeed * (Math.random() > 0.5 ? 1 : -1); dy = currentSpeed * (Math.random() > 0.5 ? 1 : -1); }
                newEnemies.push({
                    x: startX, y: startY, r: ENEMY_RADIUS,
                    vx: dx, vy: dy,
                    spinAngle: Math.random() * Math.PI * 2,
                    spinSpeed: 0.02 + Math.random() * 0.015,
                    incoming: true,
                    targetX: targetX, targetY: targetY
                });
            }
            return newEnemies;
        }
        
        function createWave() { return createIncomingWave(); }
        
        function nextWave() {
            if (!gameActive) return;
            awardWaveBonus();
            wave++;
            penalty = wave;
            enemies = createWave();
            shells = [];
            shrapnel = [];
            enemyBullets = [];
            enemyFlash = [];
            playerDestroyed = false;
            updateWaveUI();
        }
        
        function checkWin() {
            if (enemies.length === 0 && !winFlag && gameActive) {
                nextWave();
            }
        }
        
        function createExplosion(x, y, isPlayer = false) {
            const cnt = 18 + Math.floor(Math.random() * 12);
            for(let i = 0; i < cnt; i++) {
                const a = Math.random() * Math.PI * 2;
                const sp = 2 + Math.random() * 5;
                particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 30+Math.random()*20, size: 2+Math.random()*4, color: `hsl(${30+Math.random()*20},80%,55%)` });
            }
            for(let i = 0; i < 12; i++) {
                const a = Math.random() * Math.PI * 2;
                const sp = 3 + Math.random() * 6;
                particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 15+Math.random()*15, size: 1+Math.random()*2, color: `hsl(50,90%,65%)` });
            }
            if(!isPlayer && Math.random() < 0.5) {
                const a = Math.random() * Math.PI * 2;
                const sp = 4 + Math.random() * 5;
                shrapnel.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 60, radius: ENEMY_RADIUS * 0.3 });
            }
        }
        
        function recalcDimensions() {
            canvasWidth = canvas.width; canvasHeight = canvas.height;
            currentOrientation = canvasWidth > canvasHeight ? 'landscape' : 'portrait';
            const baseSize = Math.min(canvasWidth, canvasHeight);
            PLAYER_RADIUS = baseSize * 0.045;
            ENEMY_RADIUS = baseSize * 0.04;
            FOLLOW_RADIUS = Math.max(canvasWidth, canvasHeight) * 0.28;
            SHELL_RADIUS = baseSize * 0.012;
            SHELL_SPEED_BASE = baseSize * 0.014;
            updateAbilities();
            ENEMY_BASE_SPEED = baseSize * 0.0022;
            if (currentOrientation === 'landscape') {
                PLAYER_X = canvasWidth * 0.12; PLAYER_Y = canvasHeight * 0.5;
                ENEMY_MIN_X = canvasWidth * 0.6; ENEMY_MAX_X = canvasWidth - ENEMY_RADIUS*2 - 10;
                ENEMY_MIN_Y = ENEMY_RADIUS * 2; ENEMY_MAX_Y = canvasHeight - ENEMY_RADIUS*2;
                resetBtn.style.bottom = '16px'; resetBtn.style.left = '16px'; resetBtn.style.right = 'auto'; resetBtn.style.top = 'auto';
            } else {
                PLAYER_X = canvasWidth * 0.5; PLAYER_Y = canvasHeight - canvasHeight * 0.12;
                ENEMY_MIN_X = ENEMY_RADIUS * 2; ENEMY_MAX_X = canvasWidth - ENEMY_RADIUS*2;
                ENEMY_MIN_Y = ENEMY_RADIUS * 2; ENEMY_MAX_Y = canvasHeight * 0.4;
                resetBtn.style.bottom = '16px'; resetBtn.style.right = '16px'; resetBtn.style.left = 'auto'; resetBtn.style.top = 'auto';
            }
            turretAngle = currentOrientation === 'landscape' ? 0.2 : -Math.PI/2;
        }
        
        function normalizeSpeed(vx, vy, targetSpeed) {
            const len = Math.hypot(vx, vy);
            if (len > 0.01) return { vx: (vx/len)*targetSpeed, vy: (vy/len)*targetSpeed };
            const angle = Math.random() * Math.PI * 2;
            return { vx: Math.cos(angle)*targetSpeed, vy: Math.sin(angle)*targetSpeed };
        }
        
        function generateStars() {
            stars = [];
            for(let i=0;i<500;i++) stars.push({ x: Math.random()*canvasWidth, y: Math.random()*canvasHeight, radius: Math.random()*2+0.5, alpha: Math.random()*0.7+0.3 });
        }
        function updateStars() {
            for(let s of stars) { s.y += STAR_SPEED; if(s.y > canvasHeight) { s.y = 0; s.x = Math.random()*canvasWidth; s.alpha = Math.random()*0.7+0.3; } }
        }
        function randomEnemyColor() { currentEnemyHue = enemyColorHues[Math.floor(Math.random()*enemyColorHues.length)]; }
        
        function resetGame() {
            if (gameOverDelayTimer) clearTimeout(gameOverDelayTimer);
            pendingGameOver = false;
            playerDestroyed = false;
            wave = 1; penalty = 1;
            shieldActive = ability_shield;
            shieldCooldownTimer = 0;
            shieldBlink = false;
            randomEnemyColor();
            enemies = createWave();
            shells = []; particles = []; shrapnel = []; enemyBullets = []; enemyFlash = [];
            score = 0; updateScoreUI();
            gameActive = true; winFlag = false;
            generateStars();
            playerSpinAngle = 0; comets = []; cometSpawnTimer = 30; playerFlash = 0; enemyShootTimer = 0;
            showGameOver();
            updateWaveUI();
        }
        
        function shootAt(x, y) {
            if (!gameActive || playerDestroyed) return;
            const dx = x - PLAYER_X, dy = y - PLAYER_Y;
            const angle = Math.atan2(dy, dx);
            const vx = Math.cos(angle) * SHELL_SPEED;
            const vy = Math.sin(angle) * SHELL_SPEED;
            let maxHits = 1;
            if (ability_pierce) maxHits = Infinity;
            if (ability_ricochet) maxHits = Infinity;
            shells.push({ x: PLAYER_X, y: PLAYER_Y, vx: vx, vy: vy, radius: SHELL_RADIUS, hits: 0, maxHits: maxHits, hasHit: false });
            playerFlash = 5;
        }
        
        function onPointerDown(event) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasWidth / rect.width, scaleY = canvasHeight / rect.height;
            let clientX, clientY;
            if (event.touches) { clientX = event.touches[0].clientX; clientY = event.touches[0].clientY; event.preventDefault(); }
            else { clientX = event.clientX; clientY = event.clientY; }
            let canvasX = (clientX - rect.left) * scaleX, canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(canvasX,0), canvasWidth); canvasY = Math.min(Math.max(canvasY,0), canvasHeight);
            shootAt(canvasX, canvasY);
        }
        
        function updateAimFromPointer(event) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasWidth / rect.width, scaleY = canvasHeight / rect.height;
            let clientX, clientY;
            if (event.touches) { clientX = event.touches[0].clientX; clientY = event.touches[0].clientY; }
            else { clientX = event.clientX; clientY = event.clientY; }
            let mx = (clientX - rect.left) * scaleX, my = (clientY - rect.top) * scaleY;
            mx = Math.min(Math.max(mx,0), canvasWidth); my = Math.min(Math.max(my,0), canvasHeight);
            const dx = mx - PLAYER_X, dy = my - PLAYER_Y;
            turretAngle = Math.atan2(dy, dx);
        }
        
        function enemyShoot(enemy, idx) {
            const angle = Math.random() * Math.PI * 2;
            const vx = Math.cos(angle) * SHELL_SPEED_BASE * 0.8;
            const vy = Math.sin(angle) * SHELL_SPEED_BASE * 0.8;
            enemyBullets.push({ x: enemy.x, y: enemy.y, vx: vx, vy: vy, radius: SHELL_RADIUS * 0.8, life: 300 });
            enemyFlash.push({ index: idx, timer: 8 });
        }
        
        function updateEnemyBullets() {
            for(let i=0; i<enemyBullets.length; i++) {
                const b = enemyBullets[i];
                b.x += b.vx; b.y += b.vy; b.life--;
                if(b.x+b.radius<0 || b.x-b.radius>canvasWidth || b.y+b.radius<0 || b.y-b.radius>canvasHeight || b.life<=0) {
                    enemyBullets.splice(i,1); i--; continue;
                }
                const dx = b.x - PLAYER_X, dy = b.y - PLAYER_Y;
                if (Math.hypot(dx, dy) < PLAYER_RADIUS + b.radius) {
                    if (gameActive && !playerDestroyed) {
                        handlePlayerHit();
                        enemyBullets = [];
                        break;
                    }
                }
            }
        }
        
        function updateEnemyFlash() {
            for(let i=0; i<enemyFlash.length; i++) {
                enemyFlash[i].timer--;
                if(enemyFlash[i].timer <= 0) { enemyFlash.splice(i,1); i--; }
            }
        }
        
        function destroyEnemy(idx, addScore = true) {
            if (idx < 0 || idx >= enemies.length) return false;
            const enemy = enemies[idx];
            if (!enemy) return false;
            enemyFlash = enemyFlash.filter(f => f.index !== idx);
            for(let f of enemyFlash) if(f.index > idx) f.index--;
            createExplosion(enemy.x, enemy.y);
            enemies.splice(idx, 1);
            if (addScore) {
                score++;
                updateScoreUI();
                onEnemyKilled();
            }
            checkWin();
            return true;
        }
        
        function updateShells() {
            for(let i=shells.length-1; i>=0; i--) {
                const s = shells[i];
                s.x += s.vx; s.y += s.vy;
                if(s.x+SHELL_RADIUS<0 || s.x-SHELL_RADIUS>canvasWidth || s.y+SHELL_RADIUS<0 || s.y-SHELL_RADIUS>canvasHeight) {
                    if(gameActive && !playerDestroyed) {
                        if (!s.hasHit) {
                            if (score === 0) { gameActive = false; winFlag = true; showGameOver(); return; }
                            else { let newScore = score - penalty; if(newScore<0) newScore=0; score=newScore; updateScoreUI(); }
                        }
                    }
                    shells.splice(i,1);
                    continue;
                }
                let hitIndices = [];
                for(let j=0; j<enemies.length; j++) {
                    const e = enemies[j];
                    if(Math.hypot(s.x - e.x, s.y - e.y) < e.r + SHELL_RADIUS) {
                        hitIndices.push(j);
                    }
                }
                if (hitIndices.length > 0) {
                    s.hasHit = true;
                    for(let k=hitIndices.length-1; k>=0; k--) {
                        const idx = hitIndices[k];
                        destroyEnemy(idx, true);
                    }
                    s.hits++;
                    if (s.hits >= s.maxHits) {
                        shells.splice(i,1);
                    } else if (ability_ricochet) {
                        const newAngle = Math.atan2(s.vy, s.vx) + (Math.random() - 0.5) * Math.PI;
                        const speed = Math.hypot(s.vx, s.vy);
                        s.vx = Math.cos(newAngle) * speed;
                        s.vy = Math.sin(newAngle) * speed;
                    }
                }
            }
        }
        
        function updateShrapnel() {
            for(let i=0; i<shrapnel.length; i++) {
                const sh = shrapnel[i];
                sh.x += sh.vx; sh.y += sh.vy; sh.life--;
                if(sh.life<=0 || sh.x<-50 || sh.x>canvasWidth+50 || sh.y<-50 || sh.y>canvasHeight+50) { shrapnel.splice(i,1); i--; continue; }
                let hitIndex = -1;
                for(let j=0; j<enemies.length; j++) {
                    const e = enemies[j];
                    if(Math.hypot(sh.x - e.x, sh.y - e.y) < e.r + sh.radius) { hitIndex = j; break; }
                }
                if(hitIndex !== -1) { destroyEnemy(hitIndex, true); shrapnel.splice(i,1); i--; }
            }
        }
        
        function updateParticles() {
            for(let i=0; i<particles.length; i++) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                if(p.life<=0) { particles.splice(i,1); i--; }
            }
        }
        
        function moveEnemies() {
            const targetSpeed = ENEMY_BASE_SPEED * ENEMY_SPEED_MULTIPLIER;
            for(let e of enemies) {
                e.spinAngle += e.spinSpeed;
                e.x += e.vx; e.y += e.vy;
                if (e.incoming) {
                    const inside = (e.x >= ENEMY_MIN_X && e.x <= ENEMY_MAX_X && e.y >= ENEMY_MIN_Y && e.y <= ENEMY_MAX_Y);
                    if (inside) {
                        e.incoming = false;
                        let vx = (Math.random() - 0.5) * targetSpeed * 1.6;
                        let vy = (Math.random() - 0.5) * targetSpeed * 1.6;
                        const len = Math.hypot(vx, vy);
                        if (len > 0.01) { vx = vx/len * targetSpeed; vy = vy/len * targetSpeed; }
                        else { vx = targetSpeed * (Math.random()>0.5?1:-1); vy = targetSpeed * (Math.random()>0.5?1:-1); }
                        e.vx = vx; e.vy = vy;
                    } else if (e.x < ENEMY_MIN_X-200 || e.x > ENEMY_MAX_X+200 || e.y < ENEMY_MIN_Y-200 || e.y > ENEMY_MAX_Y+200) {
                        e.x = ENEMY_MIN_X + Math.random() * (ENEMY_MAX_X - ENEMY_MIN_X);
                        e.y = ENEMY_MIN_Y + Math.random() * (ENEMY_MAX_Y - ENEMY_MIN_Y);
                        e.incoming = false;
                        let vx = (Math.random() - 0.5) * targetSpeed * 1.6;
                        let vy = (Math.random() - 0.5) * targetSpeed * 1.6;
                        const len = Math.hypot(vx, vy);
                        if (len > 0.01) { vx = vx/len * targetSpeed; vy = vy/len * targetSpeed; }
                        else { vx = targetSpeed * (Math.random()>0.5?1:-1); vy = targetSpeed * (Math.random()>0.5?1:-1); }
                        e.vx = vx; e.vy = vy;
                    }
                } else {
                    if(e.x - e.r < ENEMY_MIN_X) { e.x = ENEMY_MIN_X + e.r; e.vx = -e.vx; }
                    if(e.x + e.r > ENEMY_MAX_X) { e.x = ENEMY_MAX_X - e.r; e.vx = -e.vx; }
                    if(e.y - e.r < ENEMY_MIN_Y) { e.y = ENEMY_MIN_Y + e.r; e.vy = -e.vy; }
                    if(e.y + e.r > ENEMY_MAX_Y) { e.y = ENEMY_MAX_Y - e.r; e.vy = -e.vy; }
                    const norm = normalizeSpeed(e.vx, e.vy, targetSpeed);
                    e.vx = norm.vx; e.vy = norm.vy;
                }
            }
            for(let i=0; i<enemies.length; i++) {
                for(let j=i+1; j<enemies.length; j++) {
                    const a=enemies[i], b=enemies[j];
                    const dx=a.x-b.x, dy=a.y-b.y, dist=Math.hypot(dx,dy), minDist=a.r+b.r;
                    if(dist<minDist) {
                        const angle=Math.atan2(dy,dx), overlap=minDist-dist;
                        const moveX=Math.cos(angle)*overlap*0.5, moveY=Math.sin(angle)*overlap*0.5;
                        a.x+=moveX; a.y+=moveY; b.x-=moveX; b.y-=moveY;
                        const vRelX=a.vx-b.vx, vRelY=a.vy-b.vy, dot=vRelX*Math.cos(angle)+vRelY*Math.sin(angle);
                        if(dot<0) {
                            const imp=0.8;
                            a.vx-=imp*Math.cos(angle)*dot; a.vy-=imp*Math.sin(angle)*dot;
                            b.vx+=imp*Math.cos(angle)*dot; b.vy+=imp*Math.sin(angle)*dot;
                        }
                        const normA = normalizeSpeed(a.vx, a.vy, targetSpeed);
                        const normB = normalizeSpeed(b.vx, b.vy, targetSpeed);
                        a.vx = normA.vx; a.vy = normA.vy;
                        b.vx = normB.vx; b.vy = normB.vy;
                        a.x = Math.min(Math.max(a.x, ENEMY_MIN_X+a.r), ENEMY_MAX_X-a.r);
                        a.y = Math.min(Math.max(a.y, ENEMY_MIN_Y+a.r), ENEMY_MAX_Y-a.r);
                        b.x = Math.min(Math.max(b.x, ENEMY_MIN_X+b.r), ENEMY_MAX_X-b.r);
                        b.y = Math.min(Math.max(b.y, ENEMY_MIN_Y+b.r), ENEMY_MAX_Y-b.r);
                    }
                }
            }
        }
        
        // ----- КОМЕТЫ -----
        function spawnComet() {
            const side = Math.floor(Math.random() * 4);
            let x,y,vx,vy;
            let speed = 2 + Math.random() * 2;
            const isFast = Math.random() < 0.20;
            if(isFast) speed *= 3;
            const scaleSpeed = Math.min(canvasWidth, canvasHeight) * 0.004;
            speed *= scaleSpeed;
            if(side===0) { x=-10; y=Math.random()*canvasHeight; vx=speed; vy=(Math.random()-0.5)*1.5*(isFast?2:1); }
            else if(side===1) { x=canvasWidth+10; y=Math.random()*canvasHeight; vx=-speed; vy=(Math.random()-0.5)*1.5*(isFast?2:1); }
            else if(side===2) { x=Math.random()*canvasWidth; y=-10; vx=(Math.random()-0.5)*1.5*(isFast?2:1); vy=speed; }
            else { x=Math.random()*canvasWidth; y=canvasHeight+10; vx=(Math.random()-0.5)*1.5*(isFast?2:1); vy=-speed; }
            comets.push({ x,y,vx,vy, trail:[], isFast, size: (isFast?3.5:2.5)*(Math.min(canvasWidth,canvasHeight)*0.004), glow: isFast?"#ffaa66":"#ffe0a0" });
        }
        function updateComets() {
            if(cometSpawnTimer<=0) { spawnComet(); cometSpawnTimer = COMET_SPAWN_DELAY + Math.random()*120; }
            else cometSpawnTimer--;
            for(let i=0; i<comets.length; i++) {
                const c = comets[i];
                c.trail.unshift({x:c.x, y:c.y});
                if(c.trail.length>10) c.trail.pop();
                c.x += c.vx; c.y += c.vy;
                if(c.x<-150 || c.x>canvasWidth+150 || c.y<-150 || c.y>canvasHeight+150) { comets.splice(i,1); i--; }
            }
        }
        function drawComets() {
            for(let c of comets) {
                for(let j=0; j<c.trail.length; j++) {
                    const t = c.trail[j];
                    const alpha = 0.7*(1-j/c.trail.length);
                    ctx.beginPath(); ctx.arc(t.x, t.y, c.size*0.6, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,220,150,${alpha})`; ctx.fill();
                }
                ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, Math.PI*2);
                ctx.fillStyle = c.glow; ctx.fill();
                ctx.beginPath(); ctx.arc(c.x, c.y, c.size*0.5, 0, Math.PI*2);
                ctx.fillStyle = "#ffffff"; ctx.fill();
                if(c.isFast) {
                    ctx.beginPath(); ctx.arc(c.x, c.y, c.size*1.2, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(255,180,80,0.4)"; ctx.fill();
                }
            }
        }
        
        function drawStars() { for(let s of stars) { ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.fillStyle = `rgba(255,240,200,${s.alpha})`; ctx.fill(); } }
        function drawBackground() {
            const grad = ctx.createLinearGradient(0,0,0,canvasHeight);
            grad.addColorStop(0,"#0a1018"); grad.addColorStop(1,"#050a10");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvasWidth,canvasHeight);
            drawStars();
            drawComets();
        }
        function drawAimZone() {
            ctx.save();
            const grad = ctx.createRadialGradient(PLAYER_X, PLAYER_Y, PLAYER_RADIUS-2, PLAYER_X, PLAYER_Y, FOLLOW_RADIUS);
            grad.addColorStop(0, "rgba(136, 221, 255, 0.25)");
            grad.addColorStop(0.7, "rgba(136, 221, 255, 0.1)");
            grad.addColorStop(1, "rgba(136, 221, 255, 0)");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(PLAYER_X, PLAYER_Y, FOLLOW_RADIUS, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        
        // ---------- ПОЛНАЯ ОТРИСОВКА ИГРОКА ----------
        function drawPlayer() {
            if (playerDestroyed) return;
            ctx.save();
            ctx.translate(PLAYER_X, PLAYER_Y);
            ctx.rotate(playerSpinAngle);
            if(playerFlash>0) {
                const inten = playerFlash/5;
                const rad = PLAYER_RADIUS + 8;
                const grad = ctx.createRadialGradient(0,0,PLAYER_RADIUS-2,0,0,rad);
                grad.addColorStop(0, `rgba(255,220,100,${0.8*inten})`);
                grad.addColorStop(0.5, `rgba(255,180,60,${0.4*inten})`);
                grad.addColorStop(1, `rgba(255,100,20,0)`);
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0,0,rad,0,Math.PI*2); ctx.fill();
                playerFlash--;
            }
            ctx.shadowBlur = 10; ctx.shadowColor = "#c0c0c0";
            
            if (currentSkin === 'shield') {
                ctx.fillStyle = "#3388ff";
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = "#2266cc";
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = "#44aaff";
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2); ctx.fill();
                // Отрисовка щита (если активен) с миганием при восстановлении
                if ((shieldActive && !shieldBlink) || (shieldCooldownTimer > 0 && shieldBlink)) {
                    ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS+10,0,Math.PI*2);
                    ctx.fillStyle = "rgba(100,200,255,0.25)";
                    ctx.fill();
                    ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS+10,0,Math.PI*2);
                    ctx.strokeStyle = "#88ccff"; ctx.lineWidth = 2; ctx.stroke();
                }
                for(let i=0;i<12;i++) {
                    const angle = (i/12)*Math.PI*2 + playerSpinAngle * 2;
                    const x = Math.cos(angle)*(PLAYER_RADIUS+2);
                    const y = Math.sin(angle)*(PLAYER_RADIUS+2);
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = `hsl(${i * 30 + Date.now() * 0.01}, 100%, 60%)`;
                    ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2); ctx.fill();
                }
            } else if (currentSkin === 'fast') {
                ctx.beginPath();
                for(let i = 0; i < 7; i++) {
                    const angle1 = (i / 7) * Math.PI * 2 - Math.PI/2;
                    const angle2 = angle1 + (Math.PI / 7);
                    const x1 = Math.cos(angle1) * PLAYER_RADIUS;
                    const y1 = Math.sin(angle1) * PLAYER_RADIUS;
                    const x2 = Math.cos(angle2) * (PLAYER_RADIUS * 0.6);
                    const y2 = Math.sin(angle2) * (PLAYER_RADIUS * 0.6);
                    if(i === 0) ctx.moveTo(x1, y1);
                    else ctx.lineTo(x1, y1);
                    ctx.lineTo(x2, y2);
                }
                ctx.closePath();
                const grad = ctx.createLinearGradient(-PLAYER_RADIUS, -PLAYER_RADIUS, PLAYER_RADIUS, PLAYER_RADIUS);
                grad.addColorStop(0, "#9b59b6");
                grad.addColorStop(1, "#4a1a6b");
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "#ff88ff";
                ctx.lineWidth = 2;
                ctx.stroke();
                for(let i = 0; i < 7; i++) {
                    const angle = (i / 7) * Math.PI * 2 + playerSpinAngle * 2;
                    const r = PLAYER_RADIUS + 4;
                    const x1 = Math.cos(angle) * r;
                    const y1 = Math.sin(angle) * r;
                    const x2 = Math.cos(angle + 0.6) * (r - 3);
                    const y2 = Math.sin(angle + 0.6) * (r - 3);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.quadraticCurveTo(x1*0.8, y1*0.8, x2, y2);
                    ctx.strokeStyle = `hsl(${280 + i*30}, 100%, 65%)`;
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                }
                for(let i = 0; i < 5; i++) {
                    const angle = (i / 5) * Math.PI * 2 + playerSpinAngle * 3;
                    const r1 = PLAYER_RADIUS * 0.5;
                    const r2 = PLAYER_RADIUS * 0.9;
                    const x1 = Math.cos(angle) * r1;
                    const y1 = Math.sin(angle) * r1;
                    const x2 = Math.cos(angle + 0.3) * r2;
                    const y2 = Math.sin(angle + 0.3) * r2;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = "#ffaaff";
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
                for(let i = 0; i < 7; i++) {
                    const angle = (i / 7) * Math.PI * 2 + Math.PI;
                    const x = Math.cos(angle) * (PLAYER_RADIUS + 2);
                    const y = Math.sin(angle) * (PLAYER_RADIUS + 2);
                    ctx.fillStyle = "#ffaa44";
                    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2);
                    ctx.fill();
                    for(let j=1; j<=3; j++) {
                        const px = x - Math.cos(angle) * j * 2;
                        const py = y - Math.sin(angle) * j * 2;
                        ctx.fillStyle = `rgba(255, 170, 68, ${0.3 - j*0.1})`;
                        ctx.beginPath();
                        ctx.arc(px, py, 1.5 - j*0.3, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                for(let i = 0; i < 7; i++) {
                    const angle = (i / 7) * Math.PI * 2 + playerSpinAngle * 2.5;
                    const r = PLAYER_RADIUS + 2;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    ctx.fillStyle = "#ffcc44";
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 5*Math.cos(angle+0.7), y + 5*Math.sin(angle+0.7));
                    ctx.lineTo(x + 5*Math.cos(angle-0.7), y + 5*Math.sin(angle-0.7));
                    ctx.fill();
                    ctx.fillStyle = "#ffaa00";
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 3*Math.cos(angle+0.5), y + 3*Math.sin(angle+0.5));
                    ctx.lineTo(x + 3*Math.cos(angle-0.5), y + 3*Math.sin(angle-0.5));
                    ctx.fill();
                }
                for(let i = 0; i < 3; i++) {
                    const angle = (i / 3) * Math.PI * 2 + Math.PI;
                    const x = Math.cos(angle) * (PLAYER_RADIUS + 3 + i*2);
                    const y = Math.sin(angle) * (PLAYER_RADIUS + 3 + i*2);
                    ctx.fillStyle = `rgba(155, 89, 182, ${0.2 - i*0.05})`;
                    ctx.beginPath();
                    ctx.arc(x, y, 4 - i, 0, Math.PI*2);
                    ctx.fill();
                }
            } else if (currentSkin === 'pierce') {
                ctx.fillStyle = "#1a1a1a";
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = "#2a2a2a";
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = "#3a3a3a";
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS+2,0,Math.PI*2);
                ctx.strokeStyle = "#ffcc44";
                ctx.lineWidth = 2;
                ctx.stroke();
                for(let i=0;i<6;i++) {
                    const angle = (i/6)*Math.PI*2 - playerSpinAngle * 1.5;
                    const r = PLAYER_RADIUS + 2;
                    const x1 = Math.cos(angle) * (r-1);
                    const y1 = Math.sin(angle) * (r-1);
                    const x2 = Math.cos(angle) * (r+6);
                    const y2 = Math.sin(angle) * (r+6);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = "#ffcc44";
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                }
                for(let i=0;i<8;i++) {
                    const angle = (i/8)*Math.PI*2 + playerSpinAngle * 2;
                    const x = Math.cos(angle) * (PLAYER_RADIUS + 1);
                    const y = Math.sin(angle) * (PLAYER_RADIUS + 1);
                    ctx.fillStyle = "#ffaa33";
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 6*Math.cos(angle+0.6), y + 6*Math.sin(angle+0.6));
                    ctx.lineTo(x + 6*Math.cos(angle-0.6), y + 6*Math.sin(angle-0.6));
                    ctx.fill();
                    ctx.strokeStyle = "#000";
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                for(let i=0;i<4;i++) {
                    const angle = (i/4)*Math.PI*2;
                    ctx.beginPath();
                    ctx.moveTo(0,0);
                    ctx.lineTo(Math.cos(angle)*(PLAYER_RADIUS-4), Math.sin(angle)*(PLAYER_RADIUS-4));
                    ctx.lineTo(Math.cos(angle+0.3)*(PLAYER_RADIUS-4), Math.sin(angle+0.3)*(PLAYER_RADIUS-4));
                    ctx.fillStyle = "#111";
                    ctx.fill();
                }
                for(let i=0;i<6;i++) {
                    const angle = (i/6)*Math.PI*2;
                    const x = Math.cos(angle)*(PLAYER_RADIUS-3);
                    const y = Math.sin(angle)*(PLAYER_RADIUS-3);
                    ctx.fillStyle = "#ffaa44";
                    ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#ffdd88";
                    ctx.beginPath(); ctx.arc(x,y,1,0,Math.PI*2); ctx.fill();
                }
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS+5,0,Math.PI*2);
                ctx.fillStyle = "rgba(255, 200, 0, 0.15)";
                ctx.fill();
            } else if (currentSkin === 'ricochet') {
                ctx.fillStyle = "#ffcc44";
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = "#e6b800";
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = "#ffdd88";
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2); ctx.fill();
                for(let i=0;i<3;i++) {
                    const angle = (i/3)*Math.PI*2;
                    const x = Math.cos(angle)*(PLAYER_RADIUS-2);
                    const y = Math.sin(angle)*(PLAYER_RADIUS-2);
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2); ctx.fill();
                    ctx.fillStyle = "rgba(255,255,200,0.9)";
                    ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
                }
                for(let i=0;i<24;i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = PLAYER_RADIUS + 2 + Math.random() * 4;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    const alpha = 0.4 + Math.random() * 0.6;
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                    ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
                for(let i=0;i<8;i++) {
                    const angle = (i/8)*Math.PI*2 + playerSpinAngle * 3;
                    const x = Math.cos(angle)*(PLAYER_RADIUS+3);
                    const y = Math.sin(angle)*(PLAYER_RADIUS+3);
                    ctx.fillStyle = "#ffaa66";
                    ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill();
                }
            } else {
                const grad = ctx.createRadialGradient(-6,-6,5,0,0,PLAYER_RADIUS);
                grad.addColorStop(0,"#f8f8fc"); grad.addColorStop(0.5,"#b0b8c0"); grad.addColorStop(1,"#708090");
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#2a2a2a"; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2); ctx.fillStyle = "#d0d8e0"; ctx.fill();
                ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2); ctx.fillStyle = "#8898a0"; ctx.fill(); ctx.stroke();
            }
            
            for(let i=0;i<16;i++) {
                const angle = (i/16)*Math.PI*2;
                const x = Math.cos(angle)*(PLAYER_RADIUS-3), y = Math.sin(angle)*(PLAYER_RADIUS-3);
                ctx.beginPath(); ctx.arc(x,y,1.2,0,Math.PI*2); ctx.fillStyle = "#505860"; ctx.fill();
                ctx.beginPath(); ctx.arc(x,y,0.6,0,Math.PI*2); ctx.fillStyle = "#e0e8f0"; ctx.fill();
                ctx.strokeStyle = "#222"; ctx.lineWidth = 0.5; ctx.stroke();
            }
            const cockpitR = PLAYER_RADIUS * 0.55;
            ctx.beginPath(); ctx.arc(0,0, cockpitR, 0, Math.PI*2); ctx.fillStyle = "#7ec8e3"; ctx.fill();
            ctx.stroke(); ctx.beginPath(); ctx.arc(0,0, cockpitR-2, 0, Math.PI*2); ctx.fillStyle = "#9bdaf5"; ctx.fill();
            ctx.stroke(); ctx.beginPath(); ctx.arc(0,0, cockpitR-4, 0, Math.PI*2); ctx.fillStyle = "#b0e4ff"; ctx.fill(); ctx.stroke();
            const blinkX = -cockpitR*0.3, blinkY = -cockpitR*0.3;
            ctx.beginPath(); ctx.ellipse(blinkX, blinkY, cockpitR*0.3, cockpitR*0.2, 0, 0, Math.PI*2); ctx.fillStyle = "#ffffffcc"; ctx.fill();
            ctx.beginPath(); ctx.ellipse(blinkX-2, blinkY-2, cockpitR*0.15, cockpitR*0.12, 0, 0, Math.PI*2); ctx.fillStyle = "#ffffff"; ctx.fill();
            const antenaH = PLAYER_RADIUS * 0.25;
            ctx.beginPath(); ctx.moveTo(0, -cockpitR); ctx.lineTo(-3, -cockpitR - antenaH); ctx.lineTo(3, -cockpitR - antenaH); ctx.fillStyle = "#c0c8d0"; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, -cockpitR - antenaH, 2, 0, Math.PI*2); ctx.fillStyle = "#ffaa66"; ctx.fill(); ctx.stroke();
            
            if (currentSkin === 'default') {
                for(let i=0;i<12;i++) {
                    const angle = (i/12)*Math.PI*2;
                    const x = Math.cos(angle)*(PLAYER_RADIUS-2), y = Math.sin(angle)*(PLAYER_RADIUS-2);
                    ctx.shadowBlur = 3; ctx.shadowColor = `hsl(${200+i*5},100%,65%)`;
                    ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fillStyle = `hsl(${200+i*5},80%,65%)`; ctx.fill();
                    ctx.shadowBlur = 1; ctx.beginPath(); ctx.arc(x,y,0.8,0,Math.PI*2); ctx.fillStyle = `hsl(${200+i*5},100%,80%)`; ctx.fill();
                }
            }
            ctx.shadowBlur = 10; ctx.shadowColor = "#c0c0c0";
            ctx.restore();
            ctx.beginPath(); ctx.moveTo(PLAYER_X, PLAYER_Y);
            const dirX = Math.cos(turretAngle)*(PLAYER_RADIUS+14), dirY = Math.sin(turretAngle)*(PLAYER_RADIUS+14);
            ctx.lineTo(PLAYER_X+dirX, PLAYER_Y+dirY); ctx.strokeStyle = "#88ff88"; ctx.lineWidth = 2.5; ctx.stroke();
        }
        
        // ---------- ОТРИСОВКА ВРАГА ----------
        function drawEnemy(e, idx) {
            ctx.save();
            ctx.translate(e.x, e.y);
            ctx.rotate(e.spinAngle);
            let flashActive = false;
            for(let f of enemyFlash) if(f.index === idx) { flashActive = true; break; }
            if(flashActive) {
                const grad = ctx.createRadialGradient(0,0,e.r-2,0,0,e.r+8);
                grad.addColorStop(0, `rgba(255,80,80,0.9)`);
                grad.addColorStop(0.5, `rgba(255,40,40,0.6)`);
                grad.addColorStop(1, `rgba(255,0,0,0)`);
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0,0,e.r+8,0,Math.PI*2); ctx.fill();
            }
            const hue = currentEnemyHue;
            const lightColor = `hsl(${hue}, 70%, 60%)`;
            const darkColor = `hsl(${hue}, 80%, 40%)`;
            const midColor = `hsl(${hue}, 70%, 50%)`;
            ctx.shadowBlur = 6; ctx.shadowColor = `hsl(${hue}, 80%, 50%)`;
            const grad = ctx.createRadialGradient(-4,-4,4,0,0,e.r);
            grad.addColorStop(0, lightColor); grad.addColorStop(1, darkColor);
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(0,0,e.r-4,0,Math.PI*2); ctx.fillStyle = midColor; ctx.fill();
            const cockpitR = e.r * 0.52;
            ctx.beginPath(); ctx.arc(0,0, cockpitR+1, 0, Math.PI*2); ctx.strokeStyle = "#888888"; ctx.lineWidth = 1.5; ctx.stroke();
            ctx.beginPath(); ctx.arc(0,0, cockpitR, 0, Math.PI*2); ctx.fillStyle = "#6ab8d0"; ctx.fill();
            ctx.beginPath(); ctx.arc(0,0, cockpitR-2, 0, Math.PI*2); ctx.fillStyle = "#8acce8"; ctx.fill();
            ctx.beginPath(); ctx.ellipse(-cockpitR*0.3, -cockpitR*0.3, cockpitR*0.3, cockpitR*0.2, 0, 0, Math.PI*2); ctx.fillStyle = "#ffffffcc"; ctx.fill();
            for(let i=0;i<8;i++) {
                const angle = (i/8)*Math.PI*2;
                const x = Math.cos(angle)*(e.r-2), y = Math.sin(angle)*(e.r-2);
                ctx.shadowBlur = 8; ctx.shadowColor = `hsl(${hue}, 80%, 60%)`;
                ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fillStyle = `hsl(${hue}, 80%, 65%)`; ctx.fill();
                ctx.shadowBlur = 2; ctx.beginPath(); ctx.arc(x,y,1.2,0,Math.PI*2); ctx.fillStyle = `hsl(${hue}, 90%, 80%)`; ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.restore();
        }
        
        function drawEnemyBullets() {
            for(let b of enemyBullets) {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = "#ff4444"; ctx.fill();
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius-2, 0, Math.PI*2);
                ctx.fillStyle = "#ff8888"; ctx.fill();
            }
        }
        function drawParticles() { for(let p of particles) { ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fillStyle = p.color; ctx.fill(); } }
        function drawShrapnel() { for(let sh of shrapnel) { ctx.beginPath(); ctx.arc(sh.x,sh.y,sh.radius-2,0,Math.PI*2); ctx.fillStyle="#cc8844"; ctx.fill(); ctx.beginPath(); ctx.arc(sh.x,sh.y,sh.radius-4,0,Math.PI*2); ctx.fillStyle="#ffaa66"; ctx.fill(); } }
        function drawShells() {
            for(let s of shells) {
                ctx.beginPath(); ctx.arc(s.x,s.y,SHELL_RADIUS-1,0,Math.PI*2);
                ctx.fillStyle = ability_fastBullet ? "#ff4444" : (ability_ricochet ? "#ffaa44" : "#88ff44");
                ctx.fill();
                ctx.beginPath(); ctx.arc(s.x,s.y,SHELL_RADIUS-2,0,Math.PI*2);
                ctx.fillStyle = ability_fastBullet ? "#cc2222" : (ability_ricochet ? "#dd8800" : "#44cc22");
                ctx.fill();
                ctx.beginPath(); ctx.arc(s.x,s.y,SHELL_RADIUS-3,0,Math.PI*2);
                ctx.fillStyle = ability_fastBullet ? "#ff8888" : (ability_ricochet ? "#ffcc66" : "#aaff88");
                ctx.fill();
                ctx.beginPath(); ctx.arc(s.x-s.vx*1.5,s.y-s.vy*1.5,SHELL_RADIUS-3,0,Math.PI*2);
                ctx.fillStyle = ability_fastBullet ? "#ff888844" : (ability_ricochet ? "#ffcc6644" : "#aaff8844");
                ctx.fill();
            }
        }
        
        let shakeX = 0, shakeY = 0;
        function applyShake() {
            if (shakeDuration > 0 && shakeIntensity > 0) {
                shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
                shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
                ctx.translate(shakeX, shakeY);
                shakeDuration--;
                if (shakeDuration === 0) shakeIntensity = 0;
            }
        }
        
        function draw() {
            ctx.save();
            applyShake();
            drawBackground();
            drawAimZone();
            for(let i=0; i<enemies.length; i++) drawEnemy(enemies[i], i);
            drawEnemyBullets();
            drawParticles();
            drawShrapnel();
            drawPlayer();
            drawShells();
            ctx.restore();
        }
        
        function gameLoop() {
            if(gameActive) {
                playerSpinAngle += PLAYER_SPIN_SPEED;
                moveEnemies();
                updateShells();
                updateShrapnel();
                updateParticles();
                updateComets();
                updateEnemyBullets();
                updateEnemyFlash();
                updateStars();
                updateShieldCooldown();
                if(currentDifficulty === 'hard' && enemies.length > 0) {
                    if(enemyShootTimer <= 0) {
                        const randomIdx = Math.floor(Math.random() * enemies.length);
                        const randomEnemy = enemies[randomIdx];
                        if(randomEnemy) enemyShoot(randomEnemy, randomIdx);
                        enemyShootTimer = 30;
                    } else {
                        enemyShootTimer--;
                    }
                }
                if (enemies.length === 0 && !winFlag && gameActive) {
                    nextWave();
                }
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            recalcDimensions();
            generateStars();
            randomEnemyColor();
            enemies = createWave();
            shells = [];
            particles = [];
            shrapnel = [];
            enemyBullets = [];
            enemyFlash = [];
            if (gameOverDelayTimer) clearTimeout(gameOverDelayTimer);
            pendingGameOver = false;
            playerDestroyed = false;
            gameActive = true;
            winFlag = false;
            playerFlash = 0;
            comets = [];
            cometSpawnTimer = 30;
            playerSpinAngle = 0;
            enemyShootTimer = 0;
            wave = 1;
            penalty = 1;
            shieldActive = ability_shield;
            shieldCooldownTimer = 0;
            shieldBlink = false;
            showGameOver();
            updateWaveUI();
        }
        
        function setDifficulty(level) {
            currentDifficulty = level;
            switch(level) {
                case 'easy': ENEMY_SPEED_MULTIPLIER = 1.0; break;
                case 'medium': ENEMY_SPEED_MULTIPLIER = 1.7; break;
                case 'hard': ENEMY_SPEED_MULTIPLIER = 2.0; break;
            }
            if (currentDifficulty === 'easy') difficultyDot.style.backgroundColor = '#88ff44';
            else if (currentDifficulty === 'medium') difficultyDot.style.backgroundColor = '#ffcc44';
            else difficultyDot.style.backgroundColor = '#ff4444';
            resetGame();
        }
        
        function setEnemyCount(count) { ENEMY_COUNT = count; resetGame(); }
        
        function startGame() {
            startScreen.style.display = 'none';
            loadStats();
            loadRecord();
            resizeCanvas();
            updateAbilities();
            difficultyDot.style.backgroundColor = '#88ff44';
            canvas.addEventListener('mousemove', updateAimFromPointer);
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateAimFromPointer(e); });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onPointerDown(e); });
            canvas.addEventListener('mousedown', onPointerDown);
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            resetBtn.addEventListener('click', () => { resetGame(); });
            
            settingsIcon.addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.toggle('show'); });
            shopIcon.addEventListener('click', (e) => { e.stopPropagation(); shopMenu.classList.toggle('show'); });
            document.addEventListener('click', (e) => {
                if(!settingsIcon.contains(e.target) && !settingsMenu.contains(e.target)) settingsMenu.classList.remove('show');
                if(!shopIcon.contains(e.target) && !shopMenu.contains(e.target)) shopMenu.classList.remove('show');
            });
            
            document.querySelectorAll('.settings-menu button[data-enemies]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const cnt = parseInt(btn.getAttribute('data-enemies'),10);
                    if(!isNaN(cnt) && cnt !== ENEMY_COUNT) setEnemyCount(cnt);
                    settingsMenu.classList.remove('show');
                });
            });
            document.querySelectorAll('.settings-menu button[data-difficulty]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const diff = btn.getAttribute('data-difficulty');
                    setDifficulty(diff);
                    settingsMenu.classList.remove('show');
                });
            });
            
            window.addEventListener('resize', () => { resizeCanvas(); });
            gameLoop();
        }
        
        startScreen.addEventListener('click', startGame);
        startScreen.addEventListener('touchstart', startGame);
    })();
</script>
</body>
</html>
