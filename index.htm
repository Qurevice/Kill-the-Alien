    function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }

eturn; } const osc = ctx.createOscillator(), gain = ctx.createGain(); osc.type='sawtooth'; osc.frequency.setValueAtTime(fs,now); osc.frequency.exponentialRampToValueAtTime(fe,now+d); gain.gain.setValueAtTime(0.25,now); gain.gain.exponentialRampToValueAtTime(0.001,now+d); osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now+d); } catch(e) {} }); }
    function playExplosionSound() { playThrottledSound(()=>{ try { const ctx = ensureAudio(); const bs = ctx.sampleRate*0.2; const b = ctx.createBuffer(1,bs,ctx.sampleRate); const d = b.getChannelData(0); for (let i=0;i<bs;i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.04)); const s = ctx.createBufferSource(); s.buffer=b; const g = ctx.createGain(); g.gain.setValueAtTime(0.45,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2); const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(4000,ctx.currentTime); f.frequency.exponentialRampToValueAtTime(500,ctx.currentTime+0.2); s.connect(f); f.connect(g); g.connect(ctx.destination); s.start(ctx.currentTime); } catch(e) {} }); }

    function playPlayerDeathSound() { try { const ctx = ensureAudio(); const now = ctx.currentTime; const dur = 0.5; const bs = Math.floor(ctx.sampleRate*dur); const nb = ctx.createBuffer(1,bs,ctx.sampleRate); const nd = nb.getChannelData(0); for (let i=0;i<bs;i++) { const t = i/ctx.sampleRate; nd[i] = (Math.random()*2-1)*Math.exp(-t/0.1); } const ns = ctx.createBufferSource(); ns.buffer=nb; const ng = ctx.createGain(); ng.gain.setValueAtTime(0.5,now); ng.gain.exponentialRampToValueAtTime(0.001,now+dur); const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.setValueAtTime(2500,now); bp.frequency.exponentialRampToValueAtTime(200,now+dur); bp.Q.setValueAtTime(1.8,now); ns.connect(bp); bp.connect(ng); ng.connect(ctx.destination); ns.start(now); const osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.setValueAtTime(90,now); osc.frequency.exponentialRampToValueAtTime(25,now+dur); const og = ctx.createGain(); og.gain.setValueAtTime(0.3,now); og.gain.exponentialRampToValueAtTime(0.001,now+dur); osc.connect(og); og.connect(ctx.destination); osc.start(now); osc.stop(now+dur); } catch(e) {} }
    function playDischargeSound() { playThrottledSound(()=>{ try { const ctx = ensureAudio(); const now = ctx.currentTime; const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.15); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15); osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now + 0.15); } catch(e) {} }); }
    function playReflectSound() { playThrottledSound(()=>{ try { const ctx = ensureAudio(); const now = ctx.currentTime; const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(440, now + 0.08); gain.gain.setValueAtTime(0.35, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08); osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now + 0.08); const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain(); osc2.type = 'square'; osc2.frequency.setValueAtTime(1200, now); osc2.frequency.exponentialRampToValueAtTime(600, now + 0.06); gain2.gain.setValueAtTime(0.15, now); gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.06); osc2.connect(gain2); gain2.connect(ctx.destination); osc2.start(now); osc2.stop(now + 0.06); } catch(e) {} }); }

    let shakeIntensity = 0, shakeDuration = 0; const SHAKE_DECAY = 0.92;
    function addShake(i,d) { if (i>shakeIntensity||d>shakeDuration) { shakeIntensity=Math.max(shakeIntensity,i); shakeDuration=Math.max(shakeDuration,d); } }
    function applyShake(ctx) { if (shakeDuration>0 && shakeIntensity>0.1) { const ox=(Math.random()-0.5)*shakeIntensity*2, oy=(Math.random()-0.5)*shakeIntensity*2; ctx.translate(ox,oy); shakeIntensity*=SHAKE_DECAY; shakeDuration--; } else { shakeIntensity=0; shakeDuration=0; } }

    let PLAYER_X,PLAYER_Y,PLAYER_RADIUS,FOLLOW_RADIUS,ENEMY_RADIUS,ENEMY_BASE_SPEED,ENEMY_SPEED_MULTIPLIER=1.0,ENEMY_COUNT=10;
    let ENEMY_MIN_X,ENEMY_MAX_X,ENEMY_MIN_Y,ENEMY_MAX_Y;
    let playerSpinAngle=0; const PLAYER_SPIN_SPEED=0.008; let playerFlash=0,playerDestroyed=false,shieldActive=false,shieldCooldown=0;
    let recoilX=0,recoilY=0;
    let enemyFlash=[];
    let shells=[], SHELL_RADIUS, SHELL_SPEED_BASE, SHELL_SPEED;
    let enemies=[], particles=[], shrapnel=[], enemyBullets=[], lightningEffects=[], comboEffects=[], shockwaves=[];
    let score=0, record=0, maxWave=1;
    let gameActive=true, winFlag=false, turretAngle=0;
    let comets=[], cometSpawnTimer=0; const COMET_SPAWN_DELAY=180;
    let stars=[], currentOrientation='landscape', canvasWidth, canvasHeight;
    let currentDifficulty='easy', enemyShootTimer=0;

    let ability_shield=false, ability_fastBullet=false, ability_pierce=false, ability_ricochet=false, ability_discharge=false, ability_detonation=false;
    let detonationCooldown=0, detonationReady=true;

    const STAR_SPEED=0.64; const enemyColorHues=[120,0,60,30,200,270]; let currentEnemyHue=120;
    const glowColorMap={ 0:[255,255,100], 30:[255,255,100], 60:[255,255,100], 120:[100,200,255], 200:[255,150,50], 270:[180,100,255] };
    const skinsList = [
        { id: 'default', name: 'Обычный', price: 0, desc: '' },
        { id: 'shield', name: 'Щит', price: 600, desc: 'После отражения снаряда, щит перезаряжается 1 минуту.' },

    ];
    const skinDescs = {}; skinsList.forEach(s => { skinDescs[s.id] = s.desc; });

    function spawnComboEffect(x, y, count) { comboEffects.push({ x, y, count, life: 45, maxLife: 45 }); }
    function spawnShockwave(x, y) { shockwaves.push({ x, y, radius: 5, maxRadius: ENEMY_RADIUS * 6, life: 25 }); }

    function loadStats() { try { coins = parseInt(localStorage.getItem('ufo_coins')||'0',10); totalKills = parseInt(localStorage.getItem('ufo_total_kills')||'0',10); killsSinceLastBonus = totalKills % 5; currentSkin = localStorage.getItem('ufo_skin') || 'default'; if (!skinsList.some(s=>s.id===currentSkin)) currentSkin='default'; try { ownedSkins = JSON.parse(localStorage.getItem('ufo_owned_skins')); } catch(e) { ownedSkins = ['default']; } if (!ownedSkins.includes('default')) ownedSkins.push('default'); maxWave = parseInt(localStorage.getItem('ufo_max_wave')||'1',10); } catch(e) { coins=0; totalKills=0; killsSinceLastBonus=0; currentSkin='default'; ownedSkins=['default']; maxWave=1; } coinAmountSpan.innerText=coins; updateShopMenu(); updateWaveUI(); }

    function spawnComet() { const side=Math.floor(Math.random()*4); let x,y,vx,vy; let sp=2+Math.random()*2; const isFast=Math.random()<0.20; if (isFast) sp*=3; const scaleSp=Math.min(canvasWidth,canvasHeight)*0.004; sp*=scaleSp; if (side===0) { x=-10; y=Math.random()*canvasHeight; vx=sp; vy=(Math.random()-0.5)*1.5*(isFast?2:1); } else if (side===1) { x=canvasWidth+10; y=Math.random()*canvasHeight; vx=-sp; vy=(Math.random()-0.5)*1.5*(isFast?2:1); } else if (side===2) { x=Math.random()*canvasWidth; y=-10; vx=(Math.random()-0.5)*1.5*(isFast?2:1); vy=sp; } else { x=Math.random()*canvasWidth; y=canvasHeight+10; vx=(Math.random()-0.5)*1.5*(isFast?2:1); vy=-sp; } comets.push({x,y,vx,vy,trail:[],isFast,size:(isFast?3.5:2.5)*scaleSp,glow:isFast?"#ffaa66":"#ffe0a0"}); }

    function drawComboEffects() { 
        for (let ce of comboEffects) { 
            const progress = ce.life / ce.maxLife; 
            const scale = 1.0 + 0.9 * (1 - progress); 
            const alpha = Math.min(1, progress * 1.5); 
            ctx.save(); 
            ctx.translate(ce.x, ce.y); 
            ctx.scale(scale, scale); 
            ctx.font = `bold ${Math.max(24, 30 * (0.7 + progress*0.5))}px "Courier New", monospace`; 
            ctx.shadowBlur = 5; 
            ctx.shadowColor = "black";

            ctx.fillStyle = `rgba(255, 255, 200, ${alpha})`;

    function drawEnemy(e,idx) { 
        ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.spinAngle);

        let flashTimer = 0; 
        for (let f of enemyFlash) if (f.index === idx) { flashTimer = f.timer; break; } 
        const fp = flashTimer / 8; 
        const cg = (()=>{ 
            let r = normalGlow[0] + (attackGlow[0]-normalGlow[0])*fp;
            let g = normalGlow[1] + (attackGlow[1]-normalGlow[1])*fp;
            let b = normalGlow[2] + (attackGlow[2]-normalGlow[2])*fp;
            let a = normalGlow[3] + (attackGlow[3]-normalGlow[3])*fp;

        })(); 
        const gmr = e.r + 6; 
        const gg = ctx.createRadialGradient(0,0,e.r-2,0,0,gmr); 
        gg.addColorStop(0, `rgba(${cg[0]},${cg[1]},${cg[2]},${cg[3]})`);

        ctx.beginPath(); ctx.arc(0,0,gmr,0,Math.PI*2); ctx.fillStyle = gg; ctx.fill();

            fg.addColorStop(1, 'rgba(255,0,0,0)'); 
            ctx.beginPath(); ctx.arc(0,0,e.r+8,0,Math.PI*2); ctx.fillStyle = fg; ctx.fill(); 
        }

        ctx.shadowBlur = 6; ctx.shadowColor = `hsl(${hue},80%,50%)`;

        ctx.beginPath(); ctx.ellipse(-cockpitR*0.3, -cockpitR*0.3, cockpitR*0.3, cockpitR*0.2, 0, 0, Math.PI*2); ctx.fillStyle = "#ffffffcc"; ctx.fill();

            }
        } else if (currentSkin==='pierce') {

            ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS+5,0,Math.PI*2);ctx.fillStyle="rgba(255,200,0,0.15)";ctx.fill();
        } else if (currentSkin==='ricochet') {
            ctx.fillStyle="#ffdd00";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2);ctx.fill();
            ctx.fillStyle="#ffaa00";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle="#ffee44";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2);ctx.fill();
            for (let i=0;i<3;i++) { const angle=(i/3)*Math.PI*2; const x=Math.cos(angle)*(PLAYER_RADIUS-2),y=Math.sin(angle)*(PLAYER_RADIUS-2); ctx.fillStyle="#ffffff";ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle="rgba(255,200,0,0.9)";ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill(); }
            for (let i=0;i<20;i++) { const angle=Math.random()*Math.PI*2; const r=PLAYER_RADIUS+2+Math.random()*4; const x=Math.cos(angle)*r,y=Math.sin(angle)*r; const alpha=0.4+Math.random()*0.6; ctx.fillStyle=`rgba(255,220,50,${alpha})`;ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill(); }
            for (let i=0;i<8;i++) { const angle=(i/8)*Math.PI*2+playerSpinAngle*3; const x=Math.cos(angle)*(PLAYER_RADIUS+3),y=Math.sin(angle)*(PLAYER_RADIUS+3); ctx.fillStyle="#ff8800";ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill(); }
        } else if (currentSkin==='discharge') {
            ctx.fillStyle="#8800cc";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2);ctx.fill();
            ctx.fillStyle="#6600aa";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle="#aa44ff";ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2);ctx.fill();
            for (let i=0;i<3;i++) { const angle=(i/3)*Math.PI*2; const x=Math.cos(angle)*(PLAYER_RADIUS-2),y=Math.sin(angle)*(PLAYER_RADIUS-2); ctx.fillStyle="#ffffff";ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle="rgba(200,100,255,0.9)";ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill(); }
            for (let i=0;i<16;i++) { const angle=Math.random()*Math.PI*2; const r=PLAYER_RADIUS+2+Math.random()*4; const x=Math.cos(angle)*r,y=Math.sin(angle)*r; const alpha=0.4+Math.random()*0.6; ctx.fillStyle=`rgba(180,150,255,${alpha})`;ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill(); }
            for (let i=0;i<6;i++) { const angle = (i/6)*Math.PI*2 + playerSpinAngle * 2; const x = Math.cos(angle) * (PLAYER_RADIUS + 2); const y = Math.sin(angle) * (PLAYER_RADIUS + 2); ctx.fillStyle = '#ffcc44'; ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI*2); ctx.fill(); }
        } else {
            const grad=ctx.createRadialGradient(-6,-6,5,0,0,PLAYER_RADIUS); grad.addColorStop(0,"#f8f8fc");grad.addColorStop(0.5,"#b0b8c0");grad.addColorStop(1,"#708090");
            ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS,0,Math.PI*2);ctx.fill(); ctx.strokeStyle="#2a2a2a";ctx.lineWidth=1.5;ctx.stroke();
            ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-4,0,Math.PI*2);ctx.fillStyle="#d0d8e0";ctx.fill();ctx.stroke();
            ctx.beginPath();ctx.arc(0,0,PLAYER_RADIUS-8,0,Math.PI*2);ctx.fillStyle="#8898a0";ctx.fill();ctx.stroke();
        }
        for (let i=0;i<12;i++) { const angle=(i/12)*Math.PI*2; const x=Math.cos(angle)*(PLAYER_RADIUS-3),y=Math.sin(angle)*(PLAYER_RADIUS-3); ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fillStyle="#505860";ctx.fill(); ctx.beginPath();ctx.arc(x,y,0.6,0,Math.PI*2);ctx.fillStyle="#e0e8f0";ctx.fill(); ctx.strokeStyle="#222";ctx.lineWidth=0.5;ctx.stroke(); }
        const cockpitR=PLAYER_RADIUS*0.55;
        ctx.beginPath();ctx.arc(0,0,cockpitR,0,Math.PI*2);ctx.fillStyle="#7ec8e3";ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.arc(0,0,cockpitR-2,0,Math.PI*2);ctx.fillStyle="#9bdaf5";ctx.fill();ctx.stroke();
        ctx.beginPath();ctx.arc(0,0,cockpitR-4,0,Math.PI*2);ctx.fillStyle="#b0e4ff";ctx.fill();ctx.stroke();

        ctx.beginPath();ctx.ellipse(blinkX,blinkY,cockpitR*0.3,cockpitR*0.2,0,0,Math.PI*2);ctx.fillStyle="#ffffffcc";ctx.fill();
        ctx.beginPath();ctx.ellipse(blinkX-2,blinkY-2,cockpitR*0.15,cockpitR*0.12,0,0,Math.PI*2);ctx.fillStyle="#ffffff";ctx.fill();

        ctx.beginPath();ctx.arc(0,-cockpitR-antenaH,2,0,Math.PI*2);ctx.fillStyle="#ffaa66";ctx.fill();ctx.stroke();
        if (currentSkin==='default') { for (let i=0;i<10;i++) { const angle=(i/10)*Math.PI*2; const x=Math.cos(angle)*(PLAYER_RADIUS-2),y=Math.sin(angle)*(PLAYER_RADIUS-2); ctx.shadowBlur=3;ctx.shadowColor=`hsl(${200+i*5},100%,65%)`; ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fillStyle=`hsl(${200+i*5},80%,65%)`;ctx.fill(); ctx.shadowBlur=1;ctx.beginPath();ctx.arc(x,y,0.8,0,Math.PI*2);ctx.fillStyle=`hsl(${200+i*5},100%,80%)`;ctx.fill(); } }

    }

    function draw() { ctx.save(); applyShake(ctx); drawBackground(); drawAimZone(); for (let i=0;i<enemies.length;i++) drawEnemy(enemies[i],i); drawEnemyBullets(); drawParticles(); drawShrapnel(); drawShells(); drawLightning(); drawShockwaves(); drawComboEffects(); drawPlayer(); ctx.restore(); }

    function gameLoop() {
        if (gameActive) {
            playerSpinAngle+=PLAYER_SPIN_SPEED; updateRecoil(); moveEnemies(); updateShells(); updateShrapnel(); updateParticles(); updateComets(); updateEnemyBullets(); updateEnemyFlash(); updateStars(); updateShieldCooldown(); updateDetonationCooldown();
